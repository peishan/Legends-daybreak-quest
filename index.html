function renderCalendar() {
  const y = ui.monthCursor.getFullYear(), m = ui.monthCursor.getMonth();
  const first = new Date(y, m, 1);
  const startPad = first.getDay();
  const days = new Date(y, m+1, 0).getDate();
  const colors = { "Gathering Day":C.sage, "Crafting Day":C.gold, "Boss Day":C.pink, "Guild Day":C.mage, "Rest Day":C.inkSoft };
  let cells = "";
  for (let i=0;i<startPad;i++) cells += `<div></div>`;
  for (let d=1; d<=days; d++) {
    const dt = new Date(y, m, d);
    const key = dayKey(dt);
    const log = state.daysLog[key];
    const enc = log ? log.encounter : encounterForDate(key);
    const isToday = key === today();
    const col = colors[enc] || C.inkSoft;
    cells += `<div style="aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;background:${log ? col+"33" : C.creamDeep};border:${isToday ? `2px solid ${C.mageDeep}` : "1px solid transparent"}">
      <span style="font-size:11px;font-weight:${log?700:400}">${d}</span>
      ${log ? `<div style="width:4px;height:4px;border-radius:4px;background:${col};margin-top:1px"></div>` : ""}
    </div>`;
  }
  const legend = ENCOUNTER_CYCLE.map(e => `<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:8px;background:${colors[e]}"></div><span style="font-size:11px;color:${C.inkSoft}">${e}</span></div>`).join("");
  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button data-act="monthPrev">◀</button>
      <p class="disp" style="font-weight:700;margin:0">${ui.monthCursor.toLocaleString("default",{month:"long",year:"numeric"})}</p>
      <button data-act="monthNext">▶</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${["S","M","T","W","T","F","S"].map(d=>`<p style="text-align:center;font-size:10px;color:${C.inkSoft};margin:0">${d}</p>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px">${legend}</div>
  </div>`;
}

function renderSpellPicker(actionName) {
  const buttons = SPELLS.filter(s => state.player.level >= s.unlockLv).map(s => {
    const isHasteFamily = s.kind === "buff" && (s.effect === "haste" || s.effect === "improved_haste" || s.effect === "time_stop");
    const cost = (isHasteFamily && state.specialization === "enchanter") ? Math.round(s.mpCost * 0.7) : s.mpCost;
    const affordable = state.player.mp >= cost;
    return `<button data-act="${actionName}" data-arg="${s.id}" ${affordable ? "" : "disabled"} title="${escapeHtml(s.desc)}" class="disp" style="flex:1;min-width:70px;padding:8px 6px;border-radius:12px;font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;background:${affordable ? C.mageSoft : C.creamDeep};color:${affordable ? C.mageDeep : C.inkSoft}">
      <span style="font-size:16px">${s.icon}</span>
      <span>${s.name}</span>
      <span style="font-size:9.5px;color:${C.inkSoft}">${cost>0 ? `${cost} MP` : "Free"}</span>
    </button>`;
  }).join("");
  return `
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px">
      <span style="font-size:12px">✨</span><span style="font-size:12px;font-weight:700;color:${C.mageDeep}">${state.player.mp}/${state.player.maxMp} MP</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${buttons}</div>`;
}

function renderEncounterModal() {
  const enc = ui.encounter;
  if (!enc) return "";
  const isMulti = !!enc.enemies;
  const titleText = isMulti ? (enc.enemies.length > 1 ? `${enc.enemies.length} Enemies` : enc.enemies[0].name) : `${enc.enemyName}${enc.isBoss ? " · Boss" : ""}`;
  const logLines = enc.log.map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
  const enemyFxClass = (ui.fx && ui.fx.enemy && (ui.fx.enemy.kind === "hit" || ui.fx.enemy.kind === "crit")) ? (ui.fx.enemy.kind === "crit" ? "fx-shake fx-flash" : "fx-flash") : "";
  const enemyBars = isMulti
    ? enc.enemies.map((e,i) => {
        const alive = e.hp > 0;
        const isTarget = i === enc.targetIndex;
        const ePct = (e.hp / e.maxHp) * 100;
        return `<button data-act="selectTarget" data-arg="${i}" ${alive ? "" : "disabled"} class="${isTarget && alive ? enemyFxClass : ""}" style="width:100%;text-align:left;padding:8px 10px;border-radius:12px;margin-bottom:6px;background:${alive ? (isTarget ? C.mageSoft : C.creamDeep) : C.creamDeep};opacity:${alive ? 1 : 0.5};border:${isTarget && alive ? `2px solid ${C.mage}` : "2px solid transparent"};position:relative">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;font-weight:${isTarget?700:500};color:${C.ink}">${isTarget && alive ? "🎯 " : ""}${e.name}${alive ? "" : " (defeated)"}</span>
          </div>
          <div style="height:8px;border-radius:9999px;overflow:hidden;background:${C.card}">
            <div style="height:8px;width:${ePct}%;background:${C.pink};transition:width .3s"></div>
          </div>
          ${isTarget ? renderFxOverlay("enemy") : ""}
        </button>`;
      }).join("")
    : `<div class="${enemyFxClass}" style="position:relative;height:10px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-bottom:12px">
        <div style="height:10px;width:${(enc.enemyHp/enc.enemyMaxHp)*100}%;background:${C.pink};transition:width .3s"></div>
        ${renderFxOverlay("enemy")}
      </div>`;
  const bossAddBar = (enc.isBoss && enc.bossAdd && enc.bossAdd.hp > 0) ? `
    <div style="padding:8px 10px;border-radius:12px;margin-bottom:12px;background:${C.creamDeep};border:1px solid ${C.border}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-weight:600;color:${C.ink}">${enc.bossAdd.icon} ${enc.bossAdd.name}</span>
        <button data-act="attackBossAdd" class="disp" style="padding:3px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.mageDeep};color:white">Attack</button>
      </div>
      <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.card}">
        <div style="height:6px;width:${(enc.bossAdd.hp/enc.bossAdd.maxHp)*100}%;background:${C.gold};transition:width .3s"></div>
      </div>
    </div>` : "";
  const debuffNote = (enc.hitPenaltyRounds > 0) ? `<p style="font-size:10.5px;color:${C.pink};margin:0 0 8px">⚠️ -${enc.hitPenalty} to-hit for ${enc.hitPenaltyRounds} more round${enc.hitPenaltyRounds>1?"s":""}</p>` : "";
  const actionBtn = !enc.resolved
    ? `${renderSpellPicker("castSpell")}
       ${(enc.isBoss || (enc.enemies && enc.enemies.length >= 2)) && (state.potions.health_draught>0 || state.potions.greater_health_draught>0) ? `<button data-act="usePotionInFight" class="disp" style="width:100%;padding:10px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;margin-top:4px;background:${C.sageSoft};color:${C.sage}"><span>🧪</span><span>Drink Potion</span></button>` : ""}`
    : `<button data-act="claimCall" class="disp" style="width:100%;padding:12px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;background:${C.gold};color:white"><span>🏆</span><span>Claim Reward</span></button>`;
  return `<div style="position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.45)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">${titleText}</p>
        ${!enc.resolved ? `<button data-act="closeEncounter"><span style="color:${C.inkSoft}">✖</span></button>` : ""}
      </div>
      ${enemyBars}
      ${bossAddBar}
      ${debuffNote}
      ${(enc.isBoss || (enc.enemies && enc.enemies.length >= 2) || (ui.fx && ui.fx.player)) ? `<div style="position:relative;display:flex;align-items:center;gap:6px;margin:8px 0 12px"><span style="font-size:12px;color:${C.inkSoft}">❤️ Your HP</span><span style="font-size:12px;font-weight:700;color:${C.ink}">${state.player.hp}/${maxHp()}</span>${renderFxOverlay("player")}</div>` : ""}
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;max-height:120px;overflow-y:auto">${logLines}</div>
      ${actionBtn}
    </div>
  </div>`;
}

        ${renderFxOverlay("enemy")}

      ${(exp.wave === EXPEDITION_WAVES || (ui.fx && ui.fx.player)) ? `<div style="position:relative;display:flex;align-items:center;gap:6px;margin-bottom:12px"><span style="font-size:12px;color:${C.inkSoft}">❤️ Your HP</span><span style="font-size:12px;font-weight:700;color:${C.ink}">${state.player.hp}/${maxHp()}</span>${renderFxOverlay("player")}</div>` : ""}
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;max-height:120px;overflow-y:auto">${logLines}</div>
      ${actionBtn}

}

function renderDungeonModal() {
  const dg = ui.dungeon;
  if (!dg) return "";
  const roomDots = DUNGEON_ROOMS.map((_,i) => `<span style="width:7px;height:7px;border-radius:7px;background:${i < dg.roomIndex || dg.resolved ? C.mageDeep : (i === dg.roomIndex ? C.pink : C.creamDeep)}"></span>`).join("");
  const room = dg.roomState;
  let body = "";
  let closeBtn = !dg.resolved ? `<button data-act="closeDungeon"><span style="color:${C.inkSoft}">✖</span></button>` : "";

  if (dg.resolved) {
    const dropsStr = Object.entries(dg.cumDrops).map(([m,q]) => `${q}× ${m}`).join(", ");
    body = `
      <p class="disp" style="font-weight:700;font-size:16px;margin:0 0 8px">🏆 Dungeon Cleared</p>
      <p style="font-size:13px;color:${C.inkSoft};margin:0 0 16px">Total: ${dg.cumGold}g, ${dg.cumXp}xp${dropsStr ? `, ${dropsStr}` : ""}</p>
      <button data-act="claimDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.gold};color:white">Claim Rewards</button>`;
  } else if (room.type === "combat" || room.type === "boss") {
    const pct = (room.enemyHp / room.enemyMaxHp) * 100;
    const logLines = room.log.map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
    const enemyFxClass = (ui.fx && ui.fx.enemy && (ui.fx.enemy.kind === "hit" || ui.fx.enemy.kind === "crit")) ? (ui.fx.enemy.kind === "crit" ? "fx-shake fx-flash" : "fx-flash") : "";
    const bossAddBar = (room.type === "boss" && room.bossAdd && room.bossAdd.hp > 0) ? `
      <div style="padding:8px 10px;border-radius:12px;margin-bottom:12px;background:${C.creamDeep};border:1px solid ${C.border}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600;color:${C.ink}">${room.bossAdd.icon} ${room.bossAdd.name}</span>
          <button data-act="attackDungeonBossAdd" class="disp" style="padding:3px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.mageDeep};color:white">Attack</button>
        </div>
        <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.card}">
          <div style="height:6px;width:${(room.bossAdd.hp/room.bossAdd.maxHp)*100}%;background:${C.gold};transition:width .3s"></div>
        </div>
      </div>` : "";
    const debuffNote = (room.hitPenaltyRounds > 0) ? `<p style="font-size:10.5px;color:${C.pink};margin:0 0 8px">⚠️ -${room.hitPenalty} to-hit for ${room.hitPenaltyRounds} more round${room.hitPenaltyRounds>1?"s":""}</p>` : "";
    body = `
      <p class="disp" style="font-weight:700;font-size:13px;margin:0 0 8px">${room.type === "boss" ? "👹 " : ""}${room.enemyName}${room.type === "boss" ? " · Boss Room" : ""}</p>
      <div class="${enemyFxClass}" style="position:relative;height:10px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-bottom:12px">
        <div style="height:10px;width:${pct}%;background:${C.pink};transition:width .3s"></div>
        ${renderFxOverlay("enemy")}
      </div>
      ${bossAddBar}
      ${debuffNote}
      <div style="position:relative;display:flex;align-items:center;gap:6px;margin-bottom:12px"><span style="font-size:12px;color:${C.inkSoft}">❤️ Your HP</span><span style="font-size:12px;font-weight:700;color:${C.ink}">${state.player.hp}/${maxHp()}</span>${renderFxOverlay("player")}</div>

  } else if (room.type === "trap") {
    const logLines = (room.log||[]).map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");

    const logLines = (room.log||[]).map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");

      <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 8px">📦 A Quiet Room</p>

    const logLines = (room.log||[]).map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
    body = `
      <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 8px">🌙 A Safe Alcove</p>

        : `<button data-act="continueDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.mageDeep};color:white">Continue Deeper</button>`}`;
  } else if (room.type === "branch") {
    body = !room.resolved
      ? `
        <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 6px">🔀 A Fork</p>
        <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">${room.intro}</p>
        <div style="display:flex;flex-direction:column;gap:8px">${room.options.map((opt,i) => `<button data-act="chooseDungeonBranch" data-arg="${i}" class="disp" style="padding:12px;border-radius:16px;font-size:13px;font-weight:600;background:${C.mageSoft};color:${C.mageDeep};text-align:left">${opt.label}</button>`).join("")}</div>`
      : `
        <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 8px">🔀 A Fork</p>
        <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">You chose: ${room.chosenLabel}</p>

  }

  return `<div style="position:fixed;inset:0;z-index:52;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.45)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">

function renderZoneDetailModal() {
  if (!ui.showZoneDetail) return "";
  const loc = LOCATIONS.find(l => l.id === ui.showZoneDetail);
  if (!loc) { ui.showZoneDetail = null; return ""; }
  const unlocked = state.player.level >= (loc.unlockLv||1);
  if (!unlocked) { ui.showZoneDetail = null; return ""; }
  const last = state.locations[loc.id] || 0;
  const remaining = LOCATION_COOLDOWN_MS - (ui.now - last);
  const ready = remaining <= 0;
  const flavorLine = loc.flavor[hashDay(loc.id + today()) % loc.flavor.length];
  const landmarkRows = (loc.landmarks||[]).map(lm => {
    const lmLast = state.landmarkVisits[lm.id] || 0;
    const lmRemaining = LANDMARK_COOLDOWN_MS - (ui.now - lmLast);
    const lmReady = lmRemaining <= 0;
    const pickupQuest = SIDE_QUESTS.find(sq => sq.pickupZone === loc.id && sq.pickupLandmark === lm.id && sideQuestState(sq.id) === "available");
    const turninQuest = SIDE_QUESTS.find(sq => sq.turninZone === loc.id && sq.turninLandmark === lm.id && sideQuestState(sq.id) === "active");
    const questBadge = pickupQuest
      ? `<div style="margin-top:8px;padding:10px;background:${C.gold}22;border:1px solid ${C.gold};border-radius:12px">
          <p class="disp" style="font-weight:700;font-size:11.5px;margin:0;color:${C.mageDeep}">${pickupQuest.icon} ${pickupQuest.title}</p>
          <p style="font-size:10px;color:${C.inkSoft};margin:3px 0 0;font-style:italic">${pickupQuest.giver}: "${pickupQuest.intro.length > 90 ? pickupQuest.intro.slice(0,90)+"…\"" : pickupQuest.intro}</p>
          <button data-act="pickupSideQuest" data-arg="${pickupQuest.id}" class="disp" style="margin-top:6px;padding:5px 12px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.gold};color:white">Accept Quest</button>
        </div>`
      : turninQuest ? (() => {
          const prog = sideQuestProgress(turninQuest);
          const ready = sideQuestReady(turninQuest);
          return `<div style="margin-top:8px;padding:10px;background:${ready?C.sageSoft:C.creamDeep};border:1px solid ${ready?C.sage:C.border};border-radius:12px">
            <p class="disp" style="font-weight:700;font-size:11.5px;margin:0;color:${C.mageDeep}">${turninQuest.icon} ${turninQuest.title}</p>
            <p style="font-size:10px;color:${C.inkSoft};margin:3px 0 0">${prog.have}/${prog.need} ${turninQuest.type === "kill" ? turninQuest.target+"s defeated" : Object.keys(turninQuest.need)[0]}</p>
            <button data-act="turninSideQuest" data-arg="${turninQuest.id}" ${ready?"":"disabled"} class="disp" style="margin-top:6px;padding:5px 12px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${ready?C.sage:C.card};color:${ready?"white":C.inkSoft}">${ready?"Turn In":"Not Ready"}</button>
          </div>`;
        })() : "";
    return `
      <div style="padding:10px 12px;background:${C.creamDeep};border-radius:14px;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">${lm.icon}</span>
          <div style="flex:1"><p class="disp" style="font-weight:700;font-size:12.5px;margin:0">${lm.name}</p><p style="font-size:10px;color:${C.inkSoft};margin:1px 0 0">${lmReady ? "Ready to explore" : `Resting · ${fmtMs(lmRemaining)}`}</p></div>
          <button data-act="visitLandmark" data-arg="${loc.id}|${lm.id}" ${lmReady?"":"disabled"} class="disp" style="padding:5px 12px;border-radius:9999px;font-size:10.5px;font-weight:700;flex-shrink:0;background:${lmReady?C.sage:C.card};color:${lmReady?"white":C.inkSoft}">Explore</button>
        </div>
        ${questBadge}
      </div>`;
  }).join("");
  return `<div style="position:fixed;inset:0;z-index:56;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="position:relative;background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:88vh;overflow-y:auto">
      <div style="position:absolute;top:32px;right:32px;z-index:2"><button data-act="closeZoneDetail"><span style="color:white;background:rgba(0,0,0,.3);border-radius:9999px;width:26px;height:26px;display:flex;align-items:center;justify-content:center">✖</span></button></div>
      ${renderSceneHeader(loc.icon, loc.name, `Unlocked at Level ${loc.unlockLv}`, C.sage, C.mageDeep)}
      <p style="font-size:12.5px;color:${C.inkSoft};font-style:italic;margin:0 0 14px">${flavorLine}</p>
      <div style="display:flex;align-items:center;gap:10px;padding:12px;background:${C.mageSoft};border-radius:14px;margin-bottom:14px">
        <span style="font-size:22px">${loc.icon}</span>
        <div style="flex:1"><p class="disp" style="font-weight:700;font-size:13px;margin:0;color:${C.mageDeep}">Explore the Whole Zone</p><p style="font-size:10px;color:${C.inkSoft};margin:1px 0 0">${ready ? "Ready" : `Resting · ${fmtMs(remaining)}`}</p></div>
        <button data-act="visitLocation" data-arg="${loc.id}" ${ready?"":"disabled"} class="disp" style="padding:6px 14px;border-radius:9999px;font-size:11px;font-weight:700;flex-shrink:0;background:${ready?C.mageDeep:C.card};color:${ready?"white":C.inkSoft}">Visit</button>
      </div>
      <p class="disp" style="font-weight:700;font-size:12px;color:${C.mageDeep};margin:0 0 8px">Landmarks</p>
      ${landmarkRows}
    </div>
  </div>`;
}

function renderHuntingGroundsModal() {
  if (!ui.showHuntingGrounds) return "";
  const { charges } = getCharges(state, ui.now);
  const canHunt = charges >= 1;
  const tierColor = { Common:C.inkSoft, Uncommon:C.sage, Rare:C.mage, Elite:C.gold };
  const rows = HUNTING_MONSTERS.map(m => {
    const kills = state.huntingKills[m.name] || 0;
    return `
      <button data-act="beginHunt" data-arg="${m.id}" ${canHunt?"":"disabled"} class="disp" style="width:100%;display:flex;align-items:center;gap:12px;padding:12px;border-radius:16px;background:${C.creamDeep};margin-bottom:8px;text-align:left;opacity:${canHunt?1:0.5}">
        <span style="font-size:26px">${m.icon}</span>
        <div style="flex:1">
          <p class="disp" style="font-weight:700;font-size:13px;margin:0">${m.name}</p>
          <p style="font-size:10px;margin:2px 0 0;color:${tierColor[m.tier]};font-weight:700">${m.tier}</p>
        </div>
        <div style="text-align:right">
          <p style="font-size:10px;color:${C.inkSoft};margin:0">Slain</p>
          <p class="disp" style="font-size:14px;font-weight:700;color:${C.mageDeep};margin:0">${kills}</p>
        </div>
      </button>`;
  }).join("");
  return `<div style="position:fixed;inset:0;z-index:53;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">🏹 Hunting Grounds</p>
        <button data-act="closeHuntingGrounds"><span style="color:${C.inkSoft}">✖</span></button>
      </div>
      <p style="font-size:11.5px;color:${C.inkSoft};margin:0 0 14px">${canHunt ? "Pick a target. Costs 1 Focus, real combat, no random popups." : "Not enough Focus to hunt right now."}</p>
      ${rows}
    </div>
  </div>`;
}

function renderInsightsModal() {
  if (!ui.showInsights) return "";
  const w7 = insightsSummary(7);
  const w30 = insightsSummary(30);
  const statRow = (label, value, sub) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid ${C.border}">
      <span style="font-size:12px;color:${C.ink}">${label}</span>
      <div style="text-align:right">
        <span class="disp" style="font-size:13px;font-weight:700;color:${C.mageDeep}">${value}</span>
        ${sub ? `<p style="font-size:9.5px;color:${C.inkSoft};margin:0">${sub}</p>` : ""}
      </div>
    </div>`;
  const section = (title, s) => s.daysLogged === 0 ? `
    <div style="margin-bottom:16px">
      <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:0 0 6px">${title}</p>
      <p style="font-size:11px;color:${C.inkSoft};margin:0">Not enough days logged yet — check back after a few more days.</p>
    </div>` : `
    <div style="margin-bottom:16px">
      <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:0 0 6px">${title} <span style="font-weight:400;color:${C.inkSoft};font-size:11px">(${s.daysLogged} days logged)</span></p>
      ${statRow("💧 Water goal hit", `${s.waterHitDays}/${s.daysLogged}`)}
      ${statRow("🍺 Carb budget kept", `${s.carbsOkDays}/${s.daysLogged}`)}
      ${statRow("🌙 Slept early", `${s.sleptEarlyDays}/${s.daysLogged}`)}
      ${statRow("💧 Morning water", `${s.morningWaterDays}/${s.daysLogged}`)}
      ${statRow("🐱 Fed Soel", `${s.fedSoelDays}/${s.daysLogged}`)}
      ${statRow("⏳ Focus sessions", s.totalFocusSessions)}
      ${statRow("Avg. daily macros", `F${s.avgFat} P${s.avgProtein} C${s.avgCarbs}`)}
    </div>`;
  return `<div style="position:fixed;inset:0;z-index:53;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">📊 Insights</p>
        <button data-act="closeInsights"><span style="color:${C.inkSoft}">✖</span></button>
      </div>
      <p style="font-size:11px;color:${C.inkSoft};margin:0 0 14px">Everything real-life, pulled together. Today isn't counted until it rolls over.</p>
      ${section("Last 7 Days", w7)}
      ${section("Last 30 Days", w30)}
    </div>
  </div>`;
}

function renderBestiaryModal() {
  if (!ui.showBestiary) return "";
  const monsterRows = MONSTER_CODEX.map(m => {
    const kills = state.huntingKills[m.name] || 0;
    const discovered = kills > 0;
    const tierColor = { Common:C.inkSoft, Uncommon:C.sage, Rare:C.mage, Elite:C.gold };
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:${C.creamDeep};border-radius:14px;margin-bottom:8px;opacity:${discovered?1:0.55}">
        <span style="font-size:24px;filter:${discovered?"none":"grayscale(1)"}">${discovered ? m.icon : "❓"}</span>
        <div style="flex:1">
          <p class="disp" style="font-weight:700;font-size:12.5px;margin:0">${discovered ? m.name : "???"}</p>
          <p style="font-size:10px;margin:2px 0 0;color:${discovered?tierColor[m.tier]:C.inkSoft};font-weight:700">${discovered ? m.tier : "Undiscovered"}</p>
          ${discovered ? `<p style="font-size:10.5px;color:${C.inkSoft};margin:3px 0 0;font-style:italic">${m.intro}</p>` : ""}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <p style="font-size:10px;color:${C.inkSoft};margin:0">Slain</p>
          <p class="disp" style="font-size:15px;font-weight:700;color:${C.mageDeep};margin:0">${kills}</p>
        </div>
      </div>`;
  }).join("");
  const bossRows = BOSSES.map(b => {
    const kills = state.bossesKilled[b.id] || 0;
    const discovered = kills > 0;
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:${C.creamDeep};border-radius:14px;margin-bottom:8px;opacity:${discovered?1:0.55}">
        <span style="font-size:24px;filter:${discovered?"none":"grayscale(1)"}">${discovered ? "💀" : "❓"}</span>
        <div style="flex:1">
          <p class="disp" style="font-weight:700;font-size:12.5px;margin:0">${discovered ? b.name : "???"}</p>
          <p style="font-size:10px;margin:2px 0 0;color:${C.mage};font-weight:700">Level ${b.minLv}+</p>
          ${discovered ? `<p style="font-size:10.5px;color:${C.inkSoft};margin:3px 0 0;font-style:italic">${b.intro}</p>` : ""}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <p style="font-size:10px;color:${C.inkSoft};margin:0">Slain</p>
          <p class="disp" style="font-size:15px;font-weight:700;color:${C.mageDeep};margin:0">${kills}</p>
        </div>
      </div>`;
  }).join("");
  const monstersFound = MONSTER_CODEX.filter(m => (state.huntingKills[m.name]||0) > 0).length;
  const bossesFound = BOSSES.filter(b => (state.bossesKilled[b.id]||0) > 0).length;
  return `<div style="position:fixed;inset:0;z-index:53;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">📖 Bestiary</p>
        <button data-act="closeBestiary"><span style="color:${C.inkSoft}">✖</span></button>
      </div>
      <p style="font-size:11.5px;color:${C.inkSoft};margin:0 0 14px">${monstersFound}/${MONSTER_CODEX.length} monsters · ${bossesFound}/${BOSSES.length} bosses discovered</p>
      <p class="disp" style="font-weight:700;font-size:12px;color:${C.mageDeep};margin:0 0 8px">Monsters</p>
      ${monsterRows}
      <p class="disp" style="font-weight:700;font-size:12px;color:${C.mageDeep};margin:16px 0 8px">Bosses</p>
      ${bossRows}
    </div>
  </div>`;
}

function renderAchievementsModal() {
  if (!ui.showAchievements) return "";
  const rows = ACHIEVEMENTS.map(ach => {
    const claimed = state.achievementsClaimed.includes(ach.id);
    const done = ach.check();
    return `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 12px;background:${claimed?C.sageSoft:C.creamDeep};border-radius:14px;margin-bottom:8px;opacity:${done||claimed?1:0.6}">
        <span style="font-size:24px">${claimed ? "🏆" : ach.icon}</span>
        <div style="flex:1">
          <p class="disp" style="font-weight:700;font-size:12.5px;margin:0">${ach.title}</p>
          <p style="font-size:10.5px;color:${C.inkSoft};margin:2px 0 0">${ach.desc}</p>
        </div>
        ${claimed
          ? `<span style="font-size:10.5px;font-weight:700;color:${C.sage};flex-shrink:0">✔️ Done</span>`
          : `<button data-act="claimAchievement" data-arg="${ach.id}" ${done?"":"disabled"} class="disp" style="padding:5px 12px;border-radius:9999px;font-size:10.5px;font-weight:700;flex-shrink:0;background:${done?C.gold:C.card};color:${done?"white":C.inkSoft}">${done?"Claim":"Locked"}</button>`}
      </div>`;
  }).join("");
  const claimedCount = state.achievementsClaimed.length;
  return `<div style="position:fixed;inset:0;z-index:53;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">🏆 Achievements</p>
        <button data-act="closeAchievements"><span style="color:${C.inkSoft}">✖</span></button>
      </div>
      <p style="font-size:11.5px;color:${C.inkSoft};margin:0 0 14px">${claimedCount}/${ACHIEVEMENTS.length} unlocked</p>
      ${rows}
    </div>
  </div>`;
}

function renderChestModal() {
  if (!ui.showChest) return "";
  return `<div style="position:fixed;inset:0;z-index:55;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      ${renderSceneHeader("📦", "A Sealed Chest", "Whispering Forest", C.gold, C.sage)}
      <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">Half-buried near the path, an old chest sealed with a merchant's mark. Crack it open now, or bring it to Aisyah unopened?</p>
      <button data-act="chestChoice" data-arg="open" class="disp" style="width:100%;padding:12px;border-radius:16px;margin-bottom:8px;font-weight:600;background:linear-gradient(135deg, ${C.gold}, ${C.pink});color:white">Break the seal now (+80g +20xp)</button>
      <button data-act="chestChoice" data-arg="aisyah" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.mage}, ${C.mageDeep});color:white">Bring it to Aisyah unopened (permanent gold bonus)</button>
    </div>
  </div>`;
}

function renderNav() {
  const tabs = [["home","🪄","Home"], ["explore","🧭","Explore"], ["party","👥","Party"], ["bond","💞","Bond"], ["quests","📜","Quests"], ["craft","🔨","Craft"], ["calendar","📦","Calendar"]];
  const items = tabs.map(([id,icon,label]) => `
    <button data-act="setTab" data-arg="${id}" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;flex:1;color:${ui.tab===id ? C.mageDeep : C.inkSoft}">
      <span style="font-size:18px">${icon}</span>
      <span style="font-size:11px;font-weight:${ui.tab===id?700:500}">${label}</span>
    </button>`).join("");
  return `<div style="position:fixed;bottom:0;left:0;right:0;display:flex;background:${C.card};border-top:1px solid ${C.border}">${items}</div>`;
}

function renderContent() {
  if (ui.tab === "home") return renderHome();
  if (ui.tab === "explore") return renderExplore();
  if (ui.tab === "party") return renderParty();
  if (ui.tab === "bond") return renderBond();
  if (ui.tab === "quests") return renderQuests();
  if (ui.tab === "craft") return renderCraft();
  if (ui.tab === "calendar") return renderCalendar();
  return "";
}

function render() {
  ensureDaily();
  const html = `
    ${renderHeader()}
    ${renderToast()}
    <div style="padding:20px 20px 96px">${renderContent()}</div>
    ${renderEncounterModal()}
    ${renderExpeditionModal()}
    ${renderDungeonModal()}
    ${renderSpecPickerModal()}
    ${renderRepBonusModal()}
    ${renderStoryModal()}
    ${renderStrongholdModal()}
    ${renderCompanionQuestModal()}
    ${renderSkirmishModal()}
    ${renderChestModal()}
    ${renderHuntingGroundsModal()}
    ${renderBestiaryModal()}
    ${renderInsightsModal()}
    ${renderTavernModal()}
    ${renderAchievementsModal()}
    ${renderZoneDetailModal()}
    ${renderBackupModal()}
    ${renderNav()}
  `;
  document.getElementById("app").innerHTML = html;
  ui.fx = null;
}

/* ================= init ================= */
load();
render();
if (lastLoadRecovery === "backup") {
  setTimeout(() => showToast("Recovered your save from a backup — everything should be here except your very last session."), 500);
} else if (lastLoadRecovery === "default") {
  setTimeout(() => showToast("Couldn't recover your save this time — starting fresh. Sorry about that."), 500);
}
setInterval(() => { ui.now = Date.now(); if (!ui.showBackup) render(); }, 20000);

if ("serviceWorker" in navigator && (location.protocol === "http:" || location.protocol === "https:")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
