<!DOCTYPE html>

<title>Legends of Daybreak - RPG</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root {
  --bg: #0f0e17; --bg-card: #1a1825; --bg-hover: #242236; --border: #2e2c42;
  --text: #e8e6f0; --text-dim: #9ca3af; --accent: #7c3aed; --accent-light: #a78bfa;
  --hp: #ef4444; --mp: #3b82f6; --xp: #eab308; --gold: #f59e0b; --success: #22c55e; --danger: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
.hdr { background: linear-gradient(135deg, #1a1825, #242236); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.hdr-l { display: flex; align-items: center; gap: 10px; }
.pname { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 700; }
.cls { font-size: 10px; background: var(--accent); color: white; padding: 2px 8px; border-radius: 12px; font-weight: 500; }
.lvl { background: var(--xp); color: #000; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
.hdr-r { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
.sb { display: flex; align-items: center; gap: 6px; font-size: 11px; }
.si { width: 24px; text-align: center; font-size: 10px; font-weight: 700; color: var(--text-dim); }
.bar { flex: 1; height: 8px; background: #2e2c42; border-radius: 4px; overflow: hidden; }
.bf { height: 100%; border-radius: 4px; transition: width 0.3s; }
.bf-hp { background: var(--hp); } .bf-mp { background: var(--mp); } .bf-xp { background: var(--xp); }
.bt { min-width: 55px; text-align: right; font-size: 10px; color: var(--text-dim); }
.gold { font-size: 13px; font-weight: 700; color: var(--gold); text-align: right; }
.buffs { display: flex; gap: 6px; padding: 6px 16px; background: #1a1825; border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.bp { background: var(--accent); color: white; font-size: 10px; padding: 3px 10px; border-radius: 10px; }
.content { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }

.clabel { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.cdesc { font-size: 11px; color: var(--text-dim); line-height: 1.3; }
.st { font-family: 'Cinzel', serif; font-weight: 700; margin-bottom: 12px; font-size: 18px; }
.zlist { display: flex; flex-direction: column; gap: 10px; }
.zcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.zcard:hover:not(.locked) { border-color: var(--accent); }
.zcard.locked { opacity: 0.5; cursor: not-allowed; }
.zh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.zn { font-weight: 600; font-size: 15px; }
.zl { font-size: 12px; color: var(--text-dim); }
.zd { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.zm { display: flex; gap: 8px; }
.db, .xb { font-size: 10px; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
.xb { background: #eab30820; color: var(--xp); }
.erow { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.ecard { background: var(--bg-card); border: 2px solid var(--border); border-radius: 14px; padding: 12px; min-width: 90px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
.ecard.sel { border-color: var(--danger); box-shadow: 0 0 0 3px #ef444430; }
.ecard.dead { opacity: 0.4; border-color: #333; cursor: default; }
.eicon { font-size: 32px; margin-bottom: 4px; }
.ename { font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.hps { height: 6px; background: #2e2c42; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.hpt { font-size: 10px; color: var(--text-dim); }
.dt { font-size: 10px; color: #666; font-style: italic; }
.pstat { display: flex; gap: 10px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.mst { font-size: 11px; display: flex; align-items: center; gap: 4px; background: #242236; padding: 4px 10px; border-radius: 10px; }

.skills h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.slist { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.sbtn { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; cursor: pointer; transition: all 0.2s; user-select: none; }
.sbtn:hover:not(.dis) { border-color: var(--accent); }
.sbtn.sel { border-color: var(--accent); background: #7c3aed15; }
.sbtn.dis { opacity: 0.4; cursor: not-allowed; }
.sn { font-weight: 600; font-size: 13px; }
.sc { font-size: 11px; color: var(--mp); }
.sd { font-size: 11px; color: var(--text-dim); }
.abtn, .fbtn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 8px; user-select: none; }
.abtn { background: linear-gradient(135deg, var(--accent), #6d28d9); color: white; }

.plist { display: flex; flex-direction: column; gap: 10px; }
.pcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 14px; display: flex; gap: 14px; align-items: flex-start; }

.pava { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid; flex-shrink: 0; font-size: 20px; }
.pinfo { flex: 1; }
.pn { font-weight: 700; font-size: 15px; }
.pt { font-size: 12px; color: var(--text-dim); font-weight: 400; }
.pr { font-size: 12px; font-weight: 600; margin: 2px 0; }
.pd { font-size: 11px; color: var(--text-dim); line-height: 1.4; margin-bottom: 4px; }
.pb { font-size: 11px; color: var(--success); font-weight: 500; }
.ps { font-size: 10px; color: var(--text-dim); margin-top: 4px; }
.sklist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.skcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.skcard.locked { opacity: 0.5; }
.skh { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.ski { font-size: 20px; }
.skt { font-weight: 700; font-size: 14px; flex: 1; }
.sks { font-size: 10px; padding: 3px 10px; border-radius: 10px; background: var(--success); color: white; }
.skcard.locked .sks { background: #6b7280; }
.skd { display: flex; gap: 8px; margin-bottom: 6px; }
.dp { font-size: 11px; background: #242236; padding: 3px 10px; border-radius: 8px; color: var(--text-dim); }
.skdsc { font-size: 12px; color: var(--text-dim); }
.stb { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.stb h3 { font-size: 14px; margin-bottom: 10px; }
.str { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.str:last-child { border-bottom: none; }
.stn { color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
.stv { font-weight: 700; color: var(--accent-light); }
.eqs, .its { margin-bottom: 16px; }
.eqs h3, .its h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.eqg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.esl { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.esn { font-size: 10px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 4px; }
.eit { font-size: 12px; font-weight: 600; }
.est { font-size: 11px; color: var(--success); }
.ese { font-size: 11px; color: #555; font-style: italic; }
.ig { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.ic { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.ii { font-size: 24px; margin-bottom: 4px; }
.in { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
.iq { font-size: 11px; color: var(--text-dim); }
.ia { margin-top: 6px; }
.ib { padding: 4px 12px; border-radius: 8px; border: none; font-size: 11px; font-weight: 600; cursor: pointer; margin: 2px; user-select: none; }
.ib-u { background: var(--success); color: white; }
.ib-e { background: var(--mp); color: white; }
.ei { color: #555; font-style: italic; padding: 20px; text-align: center; grid-column: span 2; }
.rlist { display: flex; flex-direction: column; gap: 10px; }
.rc { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.rr { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.ri { font-size: 24px; }
.rn { font-weight: 700; font-size: 14px; }
.rd { font-size: 11px; color: var(--text-dim); }
.rms { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.mp { font-size: 10px; padding: 3px 10px; border-radius: 8px; background: #242236; color: var(--text-dim); }
.mp.ok { background: #22c55e20; color: var(--success); }
.mp.miss { background: #ef444420; color: var(--danger); }
.cb { width: 100%; padding: 10px; border-radius: 10px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; background: var(--accent); color: white; user-select: none; }
.cb.dis { opacity: 0.4; cursor: not-allowed; }
.qlist { display: flex; flex-direction: column; gap: 10px; }
.qc { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
.qc.done { border-color: var(--success); }
.qh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.qn { font-weight: 600; font-size: 14px; }
.qr { font-size: 11px; color: var(--gold); }
.qd { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.qp { display: flex; align-items: center; gap: 10px; }
.pbar { flex: 1; height: 8px; background: #2e2c42; border-radius: 4px; overflow: hidden; }
.pfill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
.ptxt { font-size: 11px; color: var(--text-dim); min-width: 40px; text-align: right; }
.sum { display: flex; gap: 10px; margin-top: 16px; }
.si2 { flex: 1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
.sv { font-size: 20px; font-weight: 700; color: var(--accent-light); display: block; }
.sl { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }
.fv { text-align: center; padding: 20px; }
.fc { width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--accent); display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; }
.ft { font-size: 36px; font-weight: 700; color: var(--accent-light); font-family: 'Cinzel', serif; }
.fl { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
.ftips { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; text-align: left; }
.ftips h3 { font-size: 14px; margin-bottom: 10px; color: var(--accent-light); }
.ftips ul { list-style: none; padding: 0; }
.ftips li { font-size: 13px; color: var(--text-dim); padding: 6px 0; border-bottom: 1px solid var(--border); }
.ftips li:last-child { border-bottom: none; }
.ftips li::before { content: "→ "; color: var(--accent); font-weight: 700; }
.cfb { padding: 12px 24px; border-radius: 12px; border: 1px solid var(--danger); background: transparent; color: var(--danger); font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; }
.log { background: #0a0912; border-top: 1px solid var(--border); padding: 10px 16px; max-height: 120px; overflow-y: auto; font-size: 12px; line-height: 1.5; flex-shrink: 0; }
.le { padding: 2px 0; color: var(--text-dim); border-bottom: 1px solid #1a1825; }
.le:last-child { border-bottom: none; }
.nav { display: flex; justify-content: space-around; background: #1a1825; border-top: 1px solid var(--border); padding: 6px 0; position: sticky; bottom: 0; z-index: 10; flex-shrink: 0; }
.nb { background: none; border: none; color: var(--text-dim); font-size: 11px; font-weight: 500; padding: 6px 8px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; transition: color 0.2s; user-select: none; flex: 1; }
.nb::before { font-size: 18px; display: block; }
.nb[data-t="home"]::before { content: "🏠"; }
.nb[data-t="exp"]::before { content: "🗺️"; }
.nb[data-t="party"]::before { content: "👥"; }
.nb[data-t="quest"]::before { content: "📜"; }
.nb[data-t="craft"]::before { content: "⚒️"; }
.nb[data-t="inv"]::before { content: "🎒"; }
.nb:hover, .nb.on { color: var(--accent-light); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>

<div id="app"></div>
<script>

const G = {
  state: 'menu',
  p: {
    name: 'San', cls: 'Sorcerer', lvl: 1, xp: 0, xpN: 100,
    hp: 80, mhp: 80, mp: 120, mmp: 120, gold: 50,
    stats: { str: 4, dex: 6, con: 5, int: 12, wis: 10, cha: 8 },
    skills: [
      { n: 'Arcane Bolt', c: 10, dmg: '1d8', on: true, d: 'Basic magic missile' },
      { n: 'Fireball', c: 25, dmg: '2d6', on: false, ul: 3, d: 'Area fire damage' },
      { n: 'Frost Shield', c: 15, on: false, ul: 2, d: '+5 AC for 3 turns', buff: true },
      { n: 'Lightning Strike', c: 35, dmg: '3d8', on: false, ul: 5, d: 'Devastating single target' },
      { n: 'Mana Surge', c: 5, on: false, ul: 4, d: 'Restore 20 MP', buff: true },
      { n: 'Meteor Swarm', c: 60, dmg: '4d10', on: false, ul: 8, d: 'Ultimate destruction' }
    ],
    eq: { w: { n: 'Apprentice Staff', atk: 2, r: 'common' }, a: { n: 'Novice Robes', def: 2, r: 'common' }, acc: null },
    inv: [
      { n: 'Health Potion', t: 'pot', eff: 'heal', v: 30, q: 3, r: 'common' },
      { n: 'Mana Potion', t: 'pot', eff: 'mana', v: 25, q: 2, r: 'common' },
      { n: 'Goblin Tooth', t: 'mat', q: 2, r: 'common' },
      { n: 'Iron Ore', t: 'mat', q: 3, r: 'common' },
      { n: 'Herb Bundle', t: 'mat', q: 4, r: 'common' }
    ],
    buffs: [], kills: 0, quests: 0, fstreak: 0
  },
  party: [
    { n: 'Joel', t: 'The Steadfast', r: 'Tank', hp: 120, mhp: 120, atk: 6, def: 8, spd: 4, on: true, d: 'Your partner and shield. Never lets you fight alone.', b: '+10% Max HP', col: '#7c3aed' },
    { n: 'Aisyah', t: 'Sisterblade', r: 'Rogue', hp: 70, mhp: 70, atk: 10, def: 4, spd: 9, on: true, d: 'Your sister, sharp-eyed and sharper-tongued.', b: '+20% Gold found', col: '#059669' },
    { n: 'Mezstorm', t: 'Stormsinger', r: 'Mage', hp: 60, mhp: 60, atk: 12, def: 3, spd: 6, on: false, ul: 3, d: 'A wandering storm mage seeking purpose.', b: '+15% Spell damage', col: '#0891b2' },
    { n: 'Eliz', t: 'Little Healer', r: 'Healer', hp: 65, mhp: 65, atk: 4, def: 5, spd: 5, on: false, ul: 4, d: 'A gentle soul with hands that mend wounds.', b: '+25% Healing potency', col: '#db2777' },
    { n: 'Senedra', t: 'Swift Scout', r: 'Ranger', hp: 75, mhp: 75, atk: 8, def: 5, spd: 10, on: false, ul: 6, d: 'An eagle-eyed tracker from the northern woods.', b: '+20% Crit chance', col: '#ca8a04' },
    { n: 'Zaki', t: 'Young Blade', r: 'Warrior', hp: 100, mhp: 100, atk: 9, def: 6, spd: 6, on: false, ul: 8, d: 'A hot-headed swordsman with a heart of gold.', b: '+15% Attack speed', col: '#dc2626' },
    { n: 'Soel', t: 'The Familiar', r: 'Support', hp: 55, mhp: 55, atk: 5, def: 4, spd: 8, on: false, ul: 10, d: 'Your loyal companion. Brings fortune to the party.', b: '+10% All stats', col: '#7c2d12' }
  ],
  cbt: { on: false, turn: 0, en: [], sk: 0, tg: 0 },
  zones: [
    { n: 'Whispering Woods', lv: 1, d: 'Mossy paths where goblins lurk.', en: ['Goblin','Wolf','Slime'], loot: ['Herb Bundle','Goblin Tooth','Health Potion'], xp: 15, dg: 'low' },
    { n: 'Cursed Catacombs', lv: 2, d: 'Ancient tombs filled with restless dead.', en: ['Skeleton','Zombie','Ghost'], loot: ['Iron Ore','Bone Shard','Mana Potion'], xp: 30, dg: 'medium' },
    { n: 'Ember Peak', lv: 4, d: 'Volcanic caves with fire elementals.', en: ['Fire Imp','Lava Slug','Ash Wraith'], loot: ['Fire Essence','Obsidian','Phoenix Feather'], xp: 60, dg: 'high' },
    { n: 'Frostspire Ruins', lv: 6, d: 'Frozen castle of a fallen ice lord.', en: ['Ice Elemental','Frost Wolf','Frozen Knight'], loot: ['Ice Crystal','Frost Gem','Glacial Staff'], xp: 100, dg: 'very high' },
    { n: 'Abyssal Depths', lv: 8, d: 'The void between worlds. Only the brave enter.', en: ['Void Beast','Shadow Demon','Abyssal Horror'], loot: ['Void Essence','Dark Crystal','Abyssal Robe'], xp: 200, dg: 'extreme' }
  ],
  recipes: [
    { n: 'Health Potion', m: { 'Herb Bundle': 2, 'Goblin Tooth': 1 }, res: { n: 'Health Potion', t: 'pot', eff: 'heal', v: 30, q: 1, r: 'common' }, d: 'Restores 30 HP' },
    { n: 'Mana Potion', m: { 'Herb Bundle': 1, 'Iron Ore': 1 }, res: { n: 'Mana Potion', t: 'pot', eff: 'mana', v: 25, q: 1, r: 'common' }, d: 'Restores 25 MP' },
    { n: 'Greater Health Potion', m: { 'Herb Bundle': 3, 'Bone Shard': 2, 'Iron Ore': 1 }, res: { n: 'Greater Health Potion', t: 'pot', eff: 'heal', v: 75, q: 1, r: 'uncommon' }, d: 'Restores 75 HP' },
    { n: 'Iron Sword', m: { 'Iron Ore': 4, 'Bone Shard': 1 }, res: { n: 'Iron Sword', t: 'wep', atk: 6, r: 'uncommon' }, d: 'ATK +6' },
    { n: 'Reinforced Robes', m: { 'Iron Ore': 2, 'Herb Bundle': 3, 'Goblin Tooth': 2 }, res: { n: 'Reinforced Robes', t: 'arm', def: 5, r: 'uncommon' }, d: 'DEF +5' },
    { n: 'Fire Staff', m: { 'Fire Essence': 2, 'Obsidian': 3, 'Iron Ore': 2 }, res: { n: 'Fire Staff', t: 'wep', atk: 10, r: 'rare' }, d: 'ATK +10, Fire damage' },
    { n: 'Frost Ring', m: { 'Ice Crystal': 2, 'Frost Gem': 1, 'Iron Ore': 1 }, res: { n: 'Frost Ring', t: 'acc', int: 3, r: 'rare' }, d: 'INT +3, Frost spells cost -5 MP' }
  ],
  quests: [
    { id: 1, n: 'First Steps', d: 'Defeat 3 monsters in Whispering Woods', t: 'kill', c: 0, need: 3, rw: { xp: 50, g: 20 }, done: false },
    { id: 2, n: 'Potion Brewer', d: 'Craft 2 potions', t: 'craft', c: 0, need: 2, rw: { xp: 30, g: 15 }, done: false },
    { id: 3, n: 'Focus Warrior', d: 'Complete a 25-minute focus session', t: 'focus', c: 0, need: 1, rw: { xp: 100, g: 50 }, done: false }
  ],
  log: ['Welcome to Legends of Daybreak, San.']
};

function rd(s) { return Math.floor(Math.random()*s)+1; }
function rdc(n,s) { let sum=0; for(let i=0;i<n;i++)sum+=rd(s); return sum; }
function r20() { return rd(20); }
function pd(ds,b) {
  if(!ds) return b||0;
  const m=ds.match(/(\d+)d(\d+)/);
  if(!m) return b||0;
  return rdc(parseInt(m[1]),parseInt(m[2]))+(b||0);
}

function sc(zi) {
  const z=G.zones[zi];
  G.cbt.on=true; G.cbt.turn=0; G.cbt.en=[]; G.state='combat';
  const ec=Math.floor(Math.random()*2)+1+Math.floor(z.lv/3);
  for(let i=0;i<ec;i++){
    const t=z.en[Math.floor(Math.random()*z.en.length)];
    let e={n:t,hp:0,mhp:0,atk:0,def:0,xp:0,g:0};
    if(t=='Goblin')e={...e,hp:25,mhp:25,atk:5,def:2,xp:12,g:5};
    else if(t=='Wolf')e={...e,hp:20,mhp:20,atk:7,def:1,xp:10,g:3};
    else if(t=='Slime')e={...e,hp:15,mhp:15,atk:3,def:3,xp:8,g:2};
    else if(t=='Skeleton')e={...e,hp:30,mhp:30,atk:6,def:3,xp:18,g:6};
    else if(t=='Zombie')e={...e,hp:40,mhp:40,atk:5,def:1,xp:20,g:5};
    else if(t=='Ghost')e={...e,hp:20,mhp:20,atk:8,def:0,xp:25,g:10};
    else if(t=='Fire Imp')e={...e,hp:35,mhp:35,atk:9,def:2,xp:35,g:12};
    else if(t=='Lava Slug')e={...e,hp:50,mhp:50,atk:6,def:5,xp:30,g:8};
    else if(t=='Ash Wraith')e={...e,hp:30,mhp:30,atk:11,def:1,xp:45,g:18};
    else if(t=='Ice Elemental')e={...e,hp:60,mhp:60,atk:10,def:6,xp:70,g:25};
    else if(t=='Frost Wolf')e={...e,hp:45,mhp:45,atk:12,def:3,xp:55,g:18};
    else if(t=='Frozen Knight')e={...e,hp:80,mhp:80,atk:14,def:8,xp:100,g:40};
    else if(t=='Void Beast')e={...e,hp:100,mhp:100,atk:16,def:5,xp:150,g:60};
    else if(t=='Shadow Demon')e={...e,hp:80,mhp:80,atk:18,def:3,xp:130,g:50};
    else if(t=='Abyssal Horror')e={...e,hp:150,mhp:150,atk:20,def:8,xp:300,g:100};
    e.id=i; G.cbt.en.push(e);
  }
  lg('Entered '+z.n+'! '+ec+' enemies appear!');
  G.cbt.sk=0; G.cbt.tg=0; render();
}

function pa(si,ti){
  const sk=G.p.skills[si], tg=G.cbt.en[ti];
  if(!tg||tg.hp<=0) return;
  if(G.p.mp<sk.c){lg('Not enough MP!');return;}
  G.p.mp-=sk.c;
  if(sk.buff){
    if(sk.n=='Frost Shield'){G.p.buffs.push({n:'Frost Shield',t:3,def:5});lg('Frost Shield! DEF +5 for 3 turns.');}
    else if(sk.n=='Mana Surge'){G.p.mp=Math.min(G.p.mmp,G.p.mp+20);lg('Mana Surge! Restored 20 MP.');}
  }else{
    const hit=r20()+Math.floor(G.p.stats.int/3);
    if(hit>=10+tg.def){
      let dmg=pd(sk.dmg,Math.floor(G.p.stats.int/2));
      dmg+=G.p.eq.w?G.p.eq.w.atk:0;
      if(G.party[2].on)dmg=Math.floor(dmg*1.15);
      dmg=Math.max(1,dmg-Math.floor(tg.def/2));
      tg.hp-=dmg; lg(sk.n+' hits '+tg.n+' for '+dmg+'!');
      if(tg.hp<=0){lg(tg.n+' defeated!');tg.hp=0;}
    }else lg('Missed '+tg.n+'!');
  }
  for(let p of G.party){
    if(!p.on||p.hp<=0)continue;
    const ae=G.cbt.en.filter(e=>e.hp>0);
    if(ae.length==0)break;
    const et=ae[Math.floor(Math.random()*ae.length)];
    const h=r20()+Math.floor(p.atk/3);
    if(h>=10+et.def){
      let d=rdc(1,6)+Math.floor(p.atk/2);
      d=Math.max(1,d-Math.floor(et.def/3));
      et.hp-=d; lg(p.n+' hits '+et.n+' for '+d+'!');
      if(et.hp<=0){lg(et.n+' falls!');et.hp=0;}
    }else lg(p.n+' misses!');
  }
  eturn();
  if(G.cbt.en.every(e=>e.hp<=0)){
    const txp=G.cbt.en.reduce((s,e)=>s+e.xp,0);
    let tg2=G.cbt.en.reduce((s,e)=>s+e.g,0);
    if(G.party[1].on)tg2=Math.floor(tg2*1.2);
    G.p.xp+=txp; G.p.gold+=tg2; G.p.kills+=G.cbt.en.length;
    lg('Victory! +'+txp+' XP, +'+tg2+' Gold!');
    const z=G.zones.find(z=>z.en.includes(G.cbt.en[0].n));
    if(z){const l=z.loot[Math.floor(Math.random()*z.loot.length)];addI({n:l,t:'mat',q:1,r:'common'});lg('Found: '+l);}
    lvlup(); checkQ();
    G.cbt.on=false; G.state='explore';
  }else if(G.p.hp<=0){
    G.p.hp=1; lg('Defeated! Retreating...');
    G.cbt.on=false; G.state='menu';
  }
  G.cbt.turn++; render();
}

function eturn(){
  for(let e of G.cbt.en){
    if(e.hp<=0)continue;
    let t=G.p;
    if(Math.random()>0.5){
      const ap=G.party.filter(p=>p.on&&p.hp>0);
      if(ap.length>0)t=ap[Math.floor(Math.random()*ap.length)];
    }
    const hit=r20()+Math.floor(e.atk/3);
    let td=t==G.p?(G.p.eq.a?G.p.eq.a.def:0):t.def;
    if(t==G.p)td+=G.p.buffs.reduce((s,b)=>s+(b.def||0),0);
    if(hit>=10+td){
      let d=rdc(1,6)+Math.floor(e.atk/2);
      d=Math.max(1,d-Math.floor(td/2));
      t.hp-=d; lg(e.n+' hits '+(t.n||'you')+' for '+d+'!');
      if(t.hp<=0){t.hp=0;lg((t.n||'You')+' unconscious!');}
    }else lg(e.n+' misses!');
  }
  for(let b of G.p.buffs)b.t--;
  G.p.buffs=G.p.buffs.filter(b=>b.t>0);
}

function lvlup(){
  while(G.p.xp>=G.p.xpN){
    G.p.xp-=G.p.xpN; G.p.lvl++;
    G.p.xpN=Math.floor(G.p.xpN*1.5);
    G.p.mhp+=10; G.p.mmp+=15; G.p.hp=G.p.mhp; G.p.mp=G.p.mmp;
    G.p.stats.int+=2; G.p.stats.con+=1;
    lg('LEVEL UP! Now Level '+G.p.lvl+'!');
    for(let s of G.p.skills){if(!s.on&&s.ul<=G.p.lvl){s.on=true;lg('Learned: '+s.n+'!');}}
    for(let p of G.party){if(!p.on&&p.ul<=G.p.lvl){p.on=true;p.hp=p.mhp;lg(p.n+' '+p.t+' joins!');}}
  }
}

function checkQ(){
  for(let q of G.quests){
    if(q.done)continue;
    if(q.t=='kill'&&G.p.kills>=q.c+q.need)q.c=q.need;
    if(q.c>=q.need){q.done=true;G.p.xp+=q.rw.xp;G.p.gold+=q.rw.g;G.p.quests++;lg('Quest: '+q.n+'! +'+q.rw.xp+'XP +'+q.rw.g+'G');lvlup();}
  }
}

function addI(it){
  const ex=G.p.inv.find(i=>i.n==it.n&&i.t==it.t);
  if(ex)ex.q+=it.q||1;
  else G.p.inv.push({...it,q:it.q||1});
}

function useI(ix){
  const it=G.p.inv[ix];
  if(!it||it.t!='pot')return;
  if(it.eff=='heal'){G.p.hp=Math.min(G.p.mhp,G.p.hp+it.v);lg('Used '+it.n+'. +'+it.v+' HP.');}
  else if(it.eff=='mana'){G.p.mp=Math.min(G.p.mmp,G.p.mp+it.v);lg('Used '+it.n+'. +'+it.v+' MP.');}
  it.q--; if(it.q<=0)G.p.inv.splice(ix,1);
  render();
}

function craft(ri){
  const r=G.recipes[ri];
  for(let [mn,mq] of Object.entries(r.m)){
    const iv=G.p.inv.find(x=>x.n==mn);
    if(!iv||iv.q<mq){lg('Missing mats for '+r.n);return;}
  }
  for(let [mn,mq] of Object.entries(r.m)){
    const iv=G.p.inv.find(x=>x.n==mn);
    iv.q-=mq; if(iv.q<=0){const ix=G.p.inv.indexOf(iv);G.p.inv.splice(ix,1);}
  }
  addI({...r.res}); lg('Crafted: '+r.n+'!');
  const pq=G.quests.find(q=>q.t=='craft');
  if(pq&&!pq.done){pq.c++;checkQ();}
  render();
}

function eqI(ix){
  const it=G.p.inv[ix];
  if(!it||(it.t!='wep'&&it.t!='arm'&&it.t!='acc'))return;
  const sl=it.t=='wep'?'w':it.t=='arm'?'a':'acc';
  const old=G.p.eq[sl];
  if(old)addI(old);
  G.p.eq[sl]={...it};
  G.p.inv.splice(ix,1);
  lg('Equipped '+it.n+'!'); render();
}

let ft=null;
function sf(){
  G.state='focus'; G.fs=Date.now(); G.fd=25*60*1000;
  lg('Focus started! 25 min...'); render();
  ft=setInterval(()=>{
    const el=Date.now()-G.fs, rm=G.fd-el;
    if(G.state!='focus'){clearInterval(ft);return;}
    if(rm<=0){
      clearInterval(ft); G.p.fstreak++; G.p.xp+=100; G.p.gold+=50;
      const fq=G.quests.find(q=>q.t=='focus');
      if(fq&&!fq.done){fq.c++;checkQ();}
      lg('Focus complete! +100XP +50G Streak:'+G.p.fstreak);
      lvlup(); G.state='menu'; render();
    }else{
      const el2=document.getElementById('ft');
      if(el2){const m=Math.floor(rm/60000),s=Math.floor((rm%60000)/1000);el2.textContent=m+':'+s.toString().padStart(2,'0');}
    }
  },1000);
}

function cf(){if(ft)clearInterval(ft);setS('menu');lg('Focus cancelled.');render();}

function lg(msg){
  G.log.push(msg); if(G.log.length>50)G.log.shift();
  const el=document.getElementById('log');
  if(el){el.innerHTML=G.log.map(m=>'<div class="le">'+m+'</div>').join('');el.scrollTop=el.scrollHeight;}
}

function setS(s){G.state=s;render();}
function rest(){G.p.hp=G.p.mhp;G.p.mp=G.p.mmp;for(let p of G.party)if(p.on)p.hp=p.mhp;lg('Rested. HP/MP restored.');render();}
function flee(){if(Math.random()>0.5){lg('Fled!');G.cbt.on=false;G.state='explore';}else{lg('Flee failed!');eturn();}render();}

function rc(c){return c=='common'?'#9ca3af':c=='uncommon'?'#22c55e':c=='rare'?'#3b82f6':'#a855f7';}
function ee(n){const m={'Goblin':'👺','Wolf':'🐺','Slime':'🟢','Skeleton':'💀','Zombie':'🧟','Ghost':'👻','Fire Imp':'🔥','Lava Slug':'🌋','Ash Wraith':'💨','Ice Elemental':'❄️','Frost Wolf':'🐕‍🦺','Frozen Knight':'🥶','Void Beast':'🌑','Shadow Demon':'👿','Abyssal Horror':'🐙'};return m[n]||'👾';}
function re(r){const m={'Tank':'🛡️','Rogue':'🗡️','Mage':'🔮','Healer':'💚','Ranger':'🏹','Warrior':'⚔️','Support':'🍀'};return m[r]||'👤';}
function ie(i){if(i.t=='pot')return i.eff=='heal'?'🧪':'💧';if(i.t=='wep')return'⚔️';if(i.t=='arm')return'🛡️';if(i.t=='acc')return'💍';if(i.t=='mat')return'💎';return'📦';}

const SAVE_KEY = 'ldb_save_v1';

function saveGame() {
  const saveData = {
    player: {
      name: G.p.name, cls: G.p.cls, lvl: G.p.lvl, xp: G.p.xp, xpN: G.p.xpN,
      hp: G.p.hp, mhp: G.p.mhp, mp: G.p.mp, mmp: G.p.mmp, gold: G.p.gold,
      stats: G.p.stats,
      skills: G.p.skills.map(s => ({ n: s.n, c: s.c, dmg: s.dmg, on: s.on, ul: s.ul, d: s.d, buff: s.buff })),
      equipment: {
        w: G.p.eq.w,
        a: G.p.eq.a,
        acc: G.p.eq.acc
      },
      inventory: G.p.inv,
      buffs: G.p.buffs,
      kills: G.p.kills, quests: G.p.quests, fstreak: G.p.fstreak
    },
    party: G.party.map(p => ({ n: p.n, t: p.t, r: p.r, hp: p.hp, mhp: p.mhp, atk: p.atk, def: p.def, spd: p.spd, on: p.on, ul: p.ul, d: p.d, b: p.b, col: p.col })),
    quests: G.quests.map(q => ({ id: q.id, n: q.n, d: q.d, t: q.t, c: q.c, need: q.need, rw: q.rw, done: q.done })),
    log: G.log,
    state: G.state
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    lg('💾 Game saved!');
    return true;
  } catch(e) {
    lg('❌ Save failed: ' + e.message);
    return false;
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);

    // Restore player
    G.p.lvl = data.player.lvl;
    G.p.xp = data.player.xp;
    G.p.xpN = data.player.xpN;
    G.p.hp = data.player.hp;
    G.p.mhp = data.player.mhp;
    G.p.mp = data.player.mp;
    G.p.mmp = data.player.mmp;
    G.p.gold = data.player.gold;
    G.p.stats = data.player.stats;
    G.p.inv = data.player.inventory;
    G.p.buffs = data.player.buffs || [];
    G.p.kills = data.player.kills;
    G.p.quests = data.player.quests;
    G.p.fstreak = data.player.fstreak;

    // Restore skills
    for (let s of G.p.skills) {
      const saved = data.player.skills.find(ss => ss.n === s.n);
      if (saved) s.on = saved.on;
    }

    // Restore equipment
    G.p.eq = data.player.equipment;

    // Restore party
    for (let p of G.party) {
      const saved = data.party.find(sp => sp.n === p.n);
      if (saved) {
        p.on = saved.on;
        p.hp = saved.hp;
        p.mhp = saved.mhp;
      }
    }

    // Restore quests
    for (let q of G.quests) {
      const saved = data.quests.find(sq => sq.id === q.id);
      if (saved) {
        q.c = saved.c;
        q.done = saved.done;
      }
    }

    G.log = data.log || ['Welcome back to Legends of Daybreak, San.'];
    lg('💾 Game loaded!');
    return true;
  } catch(e) {
    console.error('Load failed:', e);
    return false;
  }
}

function resetGame() {
  if (confirm('Are you sure? ALL progress will be lost forever!')) {
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
}

function exportSave() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) { lg('No save data to export.'); return; }
  const blob = new Blob([raw], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'legends-daybreak-save.json';
  a.click();
  URL.revokeObjectURL(url);
  lg('💾 Save exported!');
}

function importSave() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        JSON.parse(ev.target.result); // validate
        localStorage.setItem(SAVE_KEY, ev.target.result);
        loadGame();
        render();
        lg('💾 Save imported!');
      } catch(err) {
        lg('❌ Invalid save file!');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Auto-save every 30 seconds and on page hide
setInterval(saveGame, 30000);
document.addEventListener('visibilitychange', () => {
  if (document.hidden) saveGame();
});

function attachEvents() {
  document.querySelectorAll('.card[data-a]').forEach(el=>{
    el.addEventListener('click',()=>{const a=el.getAttribute('data-a');if(a=='explore')setS('explore');else if(a=='party')setS('party');else if(a=='skills')setS('skills');else if(a=='craft')setS('craft');else if(a=='quest')setS('quest');else if(a=='inventory')setS('inventory');else if(a=='focus')sf();else if(a=='rest')rest();});
  });
  const btnSave=document.getElementById('btn-save');if(btnSave)btnSave.addEventListener('click',()=>{saveGame();});
  const btnExport=document.getElementById('btn-export');if(btnExport)btnExport.addEventListener('click',exportSave);
  const btnImport=document.getElementById('btn-import');if(btnImport)btnImport.addEventListener('click',importSave);
  const btnReset=document.getElementById('btn-reset');if(btnReset)btnReset.addEventListener('click',resetGame);
  document.querySelectorAll('.zcard:not(.locked)').forEach(el=>{
    el.addEventListener('click',()=>{const i=parseInt(el.getAttribute('data-i'));sc(i);});
  });
  document.querySelectorAll('.ecard:not(.dead)').forEach(el=>{
    el.addEventListener('click',()=>{G.cbt.tg=parseInt(el.getAttribute('data-i'));render();});
  });
  document.querySelectorAll('.sbtn:not(.dis)').forEach(el=>{
    el.addEventListener('click',()=>{G.cbt.sk=parseInt(el.getAttribute('data-i'));render();});
  });
  const abtn=document.querySelector('.abtn:not(.dis)');
  if(abtn){
    abtn.addEventListener('click',()=>{
      const si=parseInt(abtn.getAttribute('data-si'));
      const ti=parseInt(abtn.getAttribute('data-ti'));
      pa(si,ti);
    });
  }
  const fbtn=document.querySelector('.fbtn');
  if(fbtn)fbtn.addEventListener('click',flee);
  document.querySelectorAll('.ib-u').forEach(el=>{
    el.addEventListener('click',(e)=>{e.stopPropagation();useI(parseInt(el.getAttribute('data-i')));});
  });
  document.querySelectorAll('.ib-e').forEach(el=>{
    el.addEventListener('click',(e)=>{e.stopPropagation();eqI(parseInt(el.getAttribute('data-i')));});
  });
  document.querySelectorAll('.cb:not(.dis)').forEach(el=>{
    el.addEventListener('click',()=>{craft(parseInt(el.getAttribute('data-i')));});
  });
  document.querySelectorAll('.nb').forEach(el=>{
    el.addEventListener('click',()=>{const a=el.getAttribute('data-a');setS(a);});
  });
  const cfb=document.querySelector('.cfb');
  if(cfb)cfb.addEventListener('click',cf);
}

function rMenu(){
  const items=[
    {i:'⚔️',l:'Adventure',d:'Explore zones and fight',a:'explore'},
    {i:'👥',l:'Party',d:'Manage companions',a:'party'},
    {i:'✨',l:'Skills',d:'View mage abilities',a:'skills'},
    {i:'⚒️',l:'Crafting',d:'Brew potions, forge gear',a:'craft'},
    {i:'📜',l:'Quests',d:'View active quests',a:'quest'},
    {i:'🎒',l:'Inventory',d:'Manage items',a:'inventory'},
    {i:'🧘',l:'Focus Mode',d:'25-min ADHD timer',a:'focus'},
    {i:'💤',l:'Rest',d:'Restore HP/MP free',a:'rest'}
  ];
  let h='<div class="grid2">';
  for(let m of items)h+='<div class="card" data-a="'+m.a+'"><div class="cicon">'+m.i+'</div><div class="clabel">'+m.l+'</div><div class="cdesc">'+m.d+'</div></div>';
  h+='</div>';
  // Save/Load section
  h+='<div style="margin-top:16px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px;">';
  h+='<h3 style="font-size:14px;margin-bottom:10px;color:var(--accent-light);">💾 Save Data</h3>';
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';
  h+='<button class="cb" style="width:auto;padding:8px 16px;font-size:12px;" id="btn-save">Save Now</button>';
  h+='<button class="cb" style="width:auto;padding:8px 16px;font-size:12px;background:#374151;" id="btn-export">Export</button>';
  h+='<button class="cb" style="width:auto;padding:8px 16px;font-size:12px;background:#374151;" id="btn-import">Import</button>';
  h+='<button class="cb" style="width:auto;padding:8px 16px;font-size:12px;background:var(--danger);" id="btn-reset">Reset</button>';
  h+='</div>';
  h+='<div style="margin-top:8px;font-size:11px;color:var(--text-dim);">Auto-saves every 30 seconds</div>';
  h+='</div>';
  return h;
}function rExp(){
  let h='<div class="explore-view"><h2 class="st">🗺️ Adventure Zones</h2><div class="zlist">';
  for(let i=0;i<G.zones.length;i++){
    const z=G.zones[i],lk=G.p.lvl<z.lv;
    const dc=z.dg=='low'?'#22c55e':z.dg=='medium'?'#eab308':z.dg=='high'?'#f97316':z.dg=='very high'?'#ef4444':'#a855f7';
    h+='<div class="zcard '+(lk?'locked':'')+'" data-i="'+i+'"><div class="zh"><span class="zn">'+z.n+'</span><span class="zl">Lv.'+z.lv+(lk?' 🔒':'')+'</span></div><div class="zd">'+z.d+'</div><div class="zm"><span class="db" style="background:'+dc+'20;color:'+dc+'">'+z.dg+'</span><span class="xb">'+z.xp+' XP</span></div></div>';
  }
  h+='</div></div>'; return h;
}

function rCbt(){
  let h='<div class="combat-view"><h2 class="st">⚔️ Combat</h2><div class="erow">';
  for(let i=0;i<G.cbt.en.length;i++){
    const e=G.cbt.en[i],d=e.hp<=0,s=G.cbt.tg==i&&!d?'sel':'';
    h+='<div class="ecard '+(d?'dead':'')+' '+s+'" data-i="'+i+'"><div class="eicon">'+(d?'💀':ee(e.n))+'</div><div class="ename">'+e.n+'</div>'+(d?'<div class="dt">DEFEATED</div>':'<div class="hps"><div class="bf bf-hp" style="width:'+((e.hp/e.mhp)*100)+'%"></div></div><div class="hpt">'+e.hp+'/'+e.mhp+'</div>')+'</div>';
  }
  h+='</div><div class="pstat"><div class="mst"><span class="md" style="background:#7c3aed"></span>San '+G.p.hp+'/'+G.p.mhp+'</div>';
  for(let p of G.party)if(p.on)h+='<div class="mst"><span class="md" style="background:'+p.col+'"></span>'+p.n+' '+p.hp+'/'+p.mhp+'</div>';
  h+='</div><div class="skills"><h3>Select Skill</h3><div class="slist">';
  const ls=G.p.skills.filter(s=>s.on);
  for(let i=0;i<ls.length;i++){
    const s=ls[i],u=G.p.mp>=s.c,sel=G.cbt.sk==i?'sel':'';
    h+='<div class="sbtn '+(u?'':'dis')+' '+sel+'" data-i="'+i+'"><div class="sn">'+s.n+'</div><div class="sc">'+s.c+' MP</div><div class="sd">'+s.d+'</div></div>';
  }
  h+='</div>';
  const sk=ls[G.cbt.sk],ca=sk&&G.p.mp>=sk.c;
  const si=G.p.skills.indexOf(sk);
  h+='<button class="abtn '+(ca?'':'dis')+'" data-si="'+si+'" data-ti="'+G.cbt.tg+'">🎯 Cast '+(sk?sk.n:'...')+'</button>';
  h+='<button class="fbtn">🏃 Flee</button></div></div>';
  return h;
}

function rParty(){
  let h='<div class="party-view"><h2 class="st">👥 Party</h2><div class="plist">';
  for(let p of G.party){
    h+='<div class="pcard '+(p.on?'':'locked')+'"><div class="pava" style="background:'+p.col+'20;border-color:'+p.col+'"><span style="font-size:28px">'+(p.on?re(p.r):'🔒')+'</span></div><div class="pinfo"><div class="pn">'+p.n+' <span class="pt">'+p.t+'</span></div><div class="pr" style="color:'+p.col+'">'+p.r+'</div><div class="pd">'+p.d+'</div><div class="pb">'+p.b+'</div>'+(p.on?'<div class="ps">HP:'+p.hp+'/'+p.mhp+' ATK:'+p.atk+' DEF:'+p.def+' SPD:'+p.spd+'</div>':'')+'</div></div>';
  }
  h+='</div></div>'; return h;
}

function rSkills(){
  let h='<div class="skills-view"><h2 class="st">✨ Mage Skills</h2><div class="sklist">';
  for(let s of G.p.skills){
    const st=s.on?'LEARNED':'Unlocks Lv.'+s.ul;
    h+='<div class="skcard '+(s.on?'':'locked')+'"><div class="skh"><span class="ski">'+(s.buff?'🛡️':'⚡')+'</span><span class="skt">'+s.n+'</span><span class="sks">'+st+'</span></div><div class="skd"><span class="dp">'+s.c+' MP</span><span class="dp">'+(s.dmg||'Buff')+'</span></div><div class="skdsc">'+s.d+'</div></div>';
  }
  h+='</div><div class="stb"><h3>Character Stats</h3>';
  for(let [k,v] of Object.entries(G.p.stats))h+='<div class="str"><span class="stn">'+k.toUpperCase()+'</span><span class="stv">'+v+'</span></div>';
  h+='</div></div>'; return h;
}

function rInv(){
  let h='<div class="inventory-view"><h2 class="st">🎒 Inventory</h2>';
  h+='<div class="eqs"><h3>Equipped</h3><div class="eqg">';
  const sn={w:'Weapon',a:'Armor',acc:'Accessory'};
  for(let sl of ['w','a','acc']){
    const it=G.p.eq[sl];
    h+='<div class="esl"><div class="esn">'+sn[sl]+'</div>'+(it?'<div class="eit" style="color:'+rc(it.r)+'">'+it.n+'</div><div class="est">'+(it.atk?'ATK +'+it.atk:it.def?'DEF +'+it.def:it.int?'INT +'+it.int:'')+'</div>':'<div class="ese">Empty</div>')+'</div>';
  }
  h+='</div></div>';
  h+='<div class="its"><h3>Items ('+G.p.inv.length+')</h3><div class="ig">';
  for(let i=0;i<G.p.inv.length;i++){
    const it=G.p.inv[i];
    h+='<div class="ic"><div class="ii">'+ie(it)+'</div><div class="in" style="color:'+rc(it.r)+'">'+it.n+'</div><div class="iq">x'+it.q+'</div><div class="ia">'+(it.t=='pot'?'<button class="ib ib-u" data-i="'+i+'">Use</button>':'')+((it.t=='wep'||it.t=='arm'||it.t=='acc')?'<button class="ib ib-e" data-i="'+i+'">Equip</button>':'')+'</div></div>';
  }
  if(G.p.inv.length==0)h+='<div class="ei">Your pack is empty.</div>';
  h+='</div></div></div>'; return h;
}

function rCraft(){
  let h='<div class="craft-view"><h2 class="st">⚒️ Crafting</h2><div class="rlist">';
  for(let i=0;i<G.recipes.length;i++){
    const r=G.recipes[i]; let ok=true,ms='';
    for(let [mn,mq] of Object.entries(r.m)){
      const iv=G.p.inv.find(x=>x.n==mn);
      const hv=iv?iv.q:0,en=hv>=mq;
      if(!en)ok=false;
      ms+='<span class="mp '+(en?'ok':'miss')+'">'+mn+': '+hv+'/'+mq+'</span>';
    }
    h+='<div class="rc"><div class="rr"><span class="ri">'+ie(r.res)+'</span><span class="rn" style="color:'+rc(r.res.r)+'">'+r.n+'</span><span class="rd">'+r.d+'</span></div><div class="rms">'+ms+'</div><button class="cb '+(ok?'':'dis')+'" data-i="'+i+'">Forge</button></div>';
  }
  h+='</div></div>'; return h;
}

function rQuest(){
  let h='<div class="quest-view"><h2 class="st">📜 Active Quests</h2><div class="qlist">';
  for(let q of G.quests){
    const pc=Math.min(100,(q.c/q.need)*100);
    h+='<div class="qc '+(q.done?'done':'')+'"><div class="qh"><span class="qn">'+(q.done?'✅ ':'')+q.n+'</span><span class="qr">'+q.rw.xp+' XP | '+q.rw.g+' G</span></div><div class="qd">'+q.d+'</div><div class="qp"><div class="pbar"><div class="pfill" style="width:'+pc+'%"></div></div><span class="ptxt">'+Math.min(q.c,q.need)+'/'+q.need+'</span></div></div>';
  }
  h+='</div><div class="sum"><div class="si2"><span class="sv">'+G.p.kills+'</span><span class="sl">Monsters</span></div><div class="si2"><span class="sv">'+G.p.quests+'</span><span class="sl">Quests</span></div><div class="si2"><span class="sv">'+G.p.fstreak+'</span><span class="sl">Focus</span></div></div></div>';
  return h;
}

function rFocus(){
  const el=Date.now()-(G.fs||Date.now()),rm=Math.max(0,G.fd-el);
  const m=Math.floor(rm/60000),s=Math.floor((rm%60000)/1000);
  return '<div class="fv"><div class="fc"><div class="ft" id="ft">'+m+':'+s.toString().padStart(2,'0')+'</div><div class="fl">Focus Mode</div></div><div class="ftips"><h3>🧠 ADHD Tips</h3><ul><li>One task at a time. No multitasking.</li><li>Put your phone face down.</li><li>Break the task into tiny steps.</li><li>Reward: +100 XP when done!</li></ul></div><button class="cfb">Cancel</button></div>';
}

// Initialize
document.addEventListener('DOMContentLoaded', function() {
  const hasSave = loadGame();
  if (!hasSave) {
    lg('Welcome to Legends of Daybreak, San.');
    lg('Tap Adventure to start your journey!');
  }
  render();
});
</script>
</body>
</html>
