function renderRecipeRow(r) {
  const afford = canAfford(r);
  const isEquip = r.type === "equipment";
  const isRing = r.slot === "ring";
  const already = isEquip && state.crafted.includes(r.id);
  const equipped = isEquip && !isRing && state.equipment[r.slot] === r.id;
  const needsStr = Object.entries(r.needs).map(([m,q]) => `${q}× ${m}`).join(", ") + (r.gold ? ` + ${r.gold}g` : "");
  const prereqNote = r.requiresCrafted && !state.crafted.includes(r.requiresCrafted)
    ? `<p style="font-size:10.5px;color:${C.pink};margin:2px 0 0">Requires ${RECIPES.find(x=>x.id===r.requiresCrafted).name}</p>` : "";
  let actionBtn;
  if (isEquip && already && isRing) {
    const inRing1 = state.equipment.ring1 === r.id, inRing2 = state.equipment.ring2 === r.id;
    actionBtn = `<div style="display:flex;gap:6px;flex-shrink:0">
      <button data-act="equipRing" data-arg="${r.id}|ring1" ${inRing1?"disabled":""} class="disp" style="padding:6px 9px;border-radius:9999px;font-size:10px;font-weight:700;background:${inRing1?C.sageSoft:C.mageSoft};color:${inRing1?C.sage:C.mageDeep}">${inRing1?"Ring 1 ✓":"→ Ring 1"}</button>
      <button data-act="equipRing" data-arg="${r.id}|ring2" ${inRing2?"disabled":""} class="disp" style="padding:6px 9px;border-radius:9999px;font-size:10px;font-weight:700;background:${inRing2?C.sageSoft:C.mageSoft};color:${inRing2?C.sage:C.mageDeep}">${inRing2?"Ring 2 ✓":"→ Ring 2"}</button>
    </div>`;
  } else if (isEquip && already) {
    actionBtn = `<button data-act="equip" data-arg="${r.id}" ${equipped?"disabled":""} class="disp" style="padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;flex-shrink:0;background:${equipped?C.sageSoft:C.mageSoft};color:${equipped?C.sage:C.mageDeep}">${equipped?"Equipped":"Equip"}</button>`;
  } else {
    actionBtn = `<button data-act="craft" data-arg="${r.id}" ${afford?"":"disabled"} class="disp" style="padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;flex-shrink:0;background:${afford?C.mageDeep:C.creamDeep};color:${afford?"white":C.inkSoft}">${r.type==="refine"?"Refine":"Craft"}</button>`;
  }
  return card(`
    <div style="padding:14px;display:flex;align-items:center;gap:12px">
      <div style="width:42px;height:42px;border-radius:12px;background:${C.mageSoft};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:20px">${r.icon}</span></div>

function renderTraders() {
  const disc = reputationDiscount();
  const matRows = MATERIALS.concat(MATERIALS_REFINED).filter(m => (state.materials[m]||0) > 0).map(m => {
    const price = Math.round((SELL_PRICES[m] || 1) * (1 + disc));

      </div>`;
  }).join("");

  const potionRows = Object.entries(state.potions).filter(([,q]) => q > 0).map(([id,q]) => {
    const r = RECIPES.find(x => x.id === id);
    const price = Math.round((POTION_SELL[id] || 4) * (1 + disc));
    return `
      <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid ${C.border}">
        <span style="font-size:12.5px">${r.name} ×${q}</span>

      </div>`;
  }).join("");

  const spareEquip = state.crafted.filter(id => !Object.values(state.equipment).includes(id));
  const equipRows = spareEquip.map(id => {
    const r = RECIPES.find(x => x.id === id);

    return `
      <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid ${C.border}">

      </div>`;
  }).join("");

  const tier = reputationTier(state.reputation||0);

    ? `Your standing as "${tier.title}" earns you +${Math.round(disc*100)}% on every sale here.`

  return `
    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 4px">Guild Standing: ${tier.title} (${state.reputation||0}${nextTier ? `, next at ${nextTier.min}` : ""})</p>

    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 8px">Lewis · Materials Trader</p>
    ${card(matRows || `<div style="padding:14px"><p style="font-size:12px;color:${C.inkSoft};margin:0">Nothing to sell — Lewis only buys raw and refined materials.</p></div>`)}
    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 8px">Jonathan · Gear & Potions Trader</p>
    ${card((potionRows+equipRows) || `<div style="padding:14px"><p style="font-size:12px;color:${C.inkSoft};margin:0">Nothing to sell — Jonathan buys potions and spare equipment.</p></div>`)}
  `;
}

function renderCalendar() {
  const y = ui.monthCursor.getFullYear(), m = ui.monthCursor.getMonth();
  const first = new Date(y, m, 1);
  const startPad = first.getDay();
  const days = new Date(y, m+1, 0).getDate();
  const colors = { "Gathering Day":C.sage, "Crafting Day":C.gold, "Boss Day":C.pink, "Guild Day":C.mage, "Rest Day":C.inkSoft };
  let cells = "";
  for (let i=0;i<startPad;i++) cells += `<div></div>`;
  for (let d=1; d<=days; d++) {
    const dt = new Date(y, m, d);
    const key = dayKey(dt);
    const log = state.daysLog[key];
    const enc = log ? log.encounter : encounterForDate(key);
    const isToday = key === today();
    const col = colors[enc] || C.inkSoft;
    cells += `<div style="aspect-ratio:1/1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;background:${log ? col+"33" : C.creamDeep};border:${isToday ? `2px solid ${C.mageDeep}` : "1px solid transparent"}">
      <span style="font-size:11px;font-weight:${log?700:400}">${d}</span>
      ${log ? `<div style="width:4px;height:4px;border-radius:4px;background:${col};margin-top:1px"></div>` : ""}
    </div>`;
  }
  const legend = ENCOUNTER_CYCLE.map(e => `<div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:8px;background:${colors[e]}"></div><span style="font-size:11px;color:${C.inkSoft}">${e}</span></div>`).join("");
  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <button data-act="monthPrev">◀</button>
      <p class="disp" style="font-weight:700;margin:0">${ui.monthCursor.toLocaleString("default",{month:"long",year:"numeric"})}</p>
      <button data-act="monthNext">▶</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px">
      ${["S","M","T","W","T","F","S"].map(d=>`<p style="text-align:center;font-size:10px;color:${C.inkSoft};margin:0">${d}</p>`).join("")}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${cells}</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px">${legend}</div>
  </div>`;
}

function renderSpellPicker(actionName) {
  const buttons = SPELLS.filter(s => state.player.level >= s.unlockLv).map(s => {
    const isHasteFamily = s.kind === "buff" && (s.effect === "haste" || s.effect === "improved_haste" || s.effect === "time_stop");
    const cost = (isHasteFamily && state.specialization === "enchanter") ? Math.round(s.mpCost * 0.7) : s.mpCost;
    const affordable = state.player.mp >= cost;
    return `<button data-act="${actionName}" data-arg="${s.id}" ${affordable ? "" : "disabled"} title="${escapeHtml(s.desc)}" class="disp" style="flex:1;min-width:70px;padding:8px 6px;border-radius:12px;font-size:10.5px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:2px;background:${affordable ? C.mageSoft : C.creamDeep};color:${affordable ? C.mageDeep : C.inkSoft}">
      <span style="font-size:16px">${s.icon}</span>
      <span>${s.name}</span>
      <span style="font-size:9.5px;color:${C.inkSoft}">${cost>0 ? `${cost} MP` : "Free"}</span>
    </button>`;
  }).join("");
  return `
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px">
      <span style="font-size:12px">✨</span><span style="font-size:12px;font-weight:700;color:${C.mageDeep}">${state.player.mp}/${state.player.maxMp} MP</span>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">${buttons}</div>`;
}

function renderEncounterModal() {
  const enc = ui.encounter;
  if (!enc) return "";
  const isMulti = !!enc.enemies;
  const titleText = isMulti ? (enc.enemies.length > 1 ? `${enc.enemies.length} Enemies` : enc.enemies[0].name) : `${enc.enemyName}${enc.isBoss ? " · Boss" : ""}`;
  const logLines = enc.log.map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
  const enemyBars = isMulti
    ? enc.enemies.map((e,i) => {
        const alive = e.hp > 0;
        const isTarget = i === enc.targetIndex;
        const ePct = (e.hp / e.maxHp) * 100;
        return `<button data-act="selectTarget" data-arg="${i}" ${alive ? "" : "disabled"} style="width:100%;text-align:left;padding:8px 10px;border-radius:12px;margin-bottom:6px;background:${alive ? (isTarget ? C.mageSoft : C.creamDeep) : C.creamDeep};opacity:${alive ? 1 : 0.5};border:${isTarget && alive ? `2px solid ${C.mage}` : "2px solid transparent"}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;font-weight:${isTarget?700:500};color:${C.ink}">${isTarget && alive ? "🎯 " : ""}${e.name}${alive ? "" : " (defeated)"}</span>
          </div>
          <div style="height:8px;border-radius:9999px;overflow:hidden;background:${C.card}">
            <div style="height:8px;width:${ePct}%;background:${C.pink};transition:width .3s"></div>
          </div>
        </button>`;
      }).join("")
    : `<div style="height:10px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-bottom:12px">
        <div style="height:10px;width:${(enc.enemyHp/enc.enemyMaxHp)*100}%;background:${C.pink};transition:width .3s"></div>
      </div>`;
  const bossAddBar = (enc.isBoss && enc.bossAdd && enc.bossAdd.hp > 0) ? `
    <div style="padding:8px 10px;border-radius:12px;margin-bottom:12px;background:${C.creamDeep};border:1px solid ${C.border}">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;font-weight:600;color:${C.ink}">${enc.bossAdd.icon} ${enc.bossAdd.name}</span>
        <button data-act="attackBossAdd" class="disp" style="padding:3px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.mageDeep};color:white">Attack</button>
      </div>
      <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.card}">
        <div style="height:6px;width:${(enc.bossAdd.hp/enc.bossAdd.maxHp)*100}%;background:${C.gold};transition:width .3s"></div>
      </div>
    </div>` : "";
  const debuffNote = (enc.hitPenaltyRounds > 0) ? `<p style="font-size:10.5px;color:${C.pink};margin:0 0 8px">⚠️ -${enc.hitPenalty} to-hit for ${enc.hitPenaltyRounds} more round${enc.hitPenaltyRounds>1?"s":""}</p>` : "";
  const actionBtn = !enc.resolved
    ? `${renderSpellPicker("castSpell")}
       ${(enc.isBoss || (enc.enemies && enc.enemies.length >= 2)) && (state.potions.health_draught>0 || state.potions.greater_health_draught>0) ? `<button data-act="usePotionInFight" class="disp" style="width:100%;padding:10px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;margin-top:4px;background:${C.sageSoft};color:${C.sage}"><span>🧪</span><span>Drink Potion</span></button>` : ""}`
    : `<button data-act="claimCall" class="disp" style="width:100%;padding:12px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;background:${C.gold};color:white"><span>🏆</span><span>Claim Reward</span></button>`;
  return `<div style="position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.45)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">${titleText}</p>
        ${!enc.resolved ? `<button data-act="closeEncounter"><span style="color:${C.inkSoft}">✖</span></button>` : ""}
      </div>
      ${enemyBars}
      ${bossAddBar}
      ${debuffNote}
      ${(enc.isBoss || (enc.enemies && enc.enemies.length >= 2)) ? `<div style="display:flex;align-items:center;gap:6px;margin:8px 0 12px"><span style="font-size:12px;color:${C.inkSoft}">❤️ Your HP</span><span style="font-size:12px;font-weight:700;color:${C.ink}">${state.player.hp}/${maxHp()}</span></div>` : ""}
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;max-height:120px;overflow-y:auto">${logLines}</div>
      ${actionBtn}
    </div>
  </div>`;
}

function renderExpeditionModal() {
  const exp = ui.expedition;
  if (!exp) return "";
  const pct = (exp.enemyHp / exp.enemyMaxHp) * 100;
  const logLines = exp.log.map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
  const waveDots = Array.from({length: EXPEDITION_WAVES}).map((_,i) => `<span style="width:7px;height:7px;border-radius:7px;background:${i < exp.wave || (i === exp.wave-1 && exp.resolved) ? C.pink : C.creamDeep}"></span>`).join("");
  const actionBtn = !exp.resolved
    ? `${renderSpellPicker("castExpeditionSpell")}
       ${exp.wave === EXPEDITION_WAVES && (state.potions.health_draught>0 || state.potions.greater_health_draught>0) ? `<button data-act="usePotionInFight" class="disp" style="width:100%;padding:10px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;margin-top:4px;background:${C.sageSoft};color:${C.sage}"><span>🧪</span><span>Drink Potion</span></button>` : ""}`
    : `<button data-act="claimExpedition" class="disp" style="width:100%;padding:12px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;background:${C.gold};color:white"><span>🏆</span><span>Claim Rewards</span></button>`;
  return `<div style="position:fixed;inset:0;z-index:51;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.45)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">🗺️ Expedition · Wave ${exp.wave}/${EXPEDITION_WAVES}</p>
        ${!exp.resolved ? `<button data-act="closeExpedition"><span style="color:${C.inkSoft}">✖</span></button>` : ""}
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px">${waveDots}</div>
      <p class="disp" style="font-weight:700;font-size:13px;margin:0 0 8px">${exp.enemyName}</p>
      <div style="height:10px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-bottom:12px">
        <div style="height:10px;width:${pct}%;background:${C.pink};transition:width .3s"></div>
      </div>
      ${exp.wave === EXPEDITION_WAVES ? `<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><span style="font-size:12px;color:${C.inkSoft}">❤️ Your HP</span><span style="font-size:12px;font-weight:700;color:${C.ink}">${state.player.hp}/${maxHp()}</span></div>` : ""}
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;max-height:120px;overflow-y:auto">${logLines}</div>
      ${actionBtn}
    </div>
  </div>`;
}

function renderRepBonusModal() {
  if (!ui.showRepBonus) return "";

  const isLastPage = ui.repBonusPage >= REP_BONUS_SCENE.pages.length - 1;
  const dots = REP_BONUS_SCENE.pages.map((_,i) => `<span style="width:6px;height:6px;border-radius:6px;background:${i===ui.repBonusPage ? C.gold : C.creamDeep}"></span>`).join("");
  return `<div style="position:fixed;inset:0;z-index:54;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">${REP_BONUS_SCENE.icon} ${REP_BONUS_SCENE.title}</p>
        <button data-act="closeRepBonus"><span style="color:${C.inkSoft}">✖</span></button>
      </div>
      <p style="font-size:13.5px;line-height:1.6;color:${C.ink};min-height:110px">${escapeHtml(page)}</p>

      <button data-act="repBonusNext" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.gold}, ${C.mageDeep});color:white">${isLastPage ? "Finish" : "Continue"}</button>
    </div>

function renderSpecPickerModal() {

      <p style="font-weight:700;font-size:14px;margin:0;color:${C.mageDeep}">${spec.icon} ${spec.name}</p>

      <p style="font-size:11px;color:${C.inkSoft};font-style:italic;margin:6px 0 0">${spec.flavor}</p>
    </button>`).join("");

    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <p class="disp" style="font-weight:700;font-size:16px;margin:0">Choose Your Specialization</p>
        <button data-act="closeSpecPicker"><span style="color:${C.inkSoft}">✖</span></button>

      <p style="font-size:12px;color:${C.inkSoft};margin:0 0 16px">This is permanent — choose thoughtfully.</p>
      ${cards}

function renderDungeonModal() {
  const dg = ui.dungeon;
  if (!dg) return "";
  const roomDots = DUNGEON_ROOMS.map((_,i) => `<span style="width:7px;height:7px;border-radius:7px;background:${i < dg.roomIndex || dg.resolved ? C.mageDeep : (i === dg.roomIndex ? C.pink : C.creamDeep)}"></span>`).join("");
  const room = dg.roomState;
  let body = "";
  let closeBtn = !dg.resolved ? `<button data-act="closeDungeon"><span style="color:${C.inkSoft}">✖</span></button>` : "";

  if (dg.resolved) {
    const dropsStr = Object.entries(dg.cumDrops).map(([m,q]) => `${q}× ${m}`).join(", ");
    body = `
      <p class="disp" style="font-weight:700;font-size:16px;margin:0 0 8px">🏆 Dungeon Cleared</p>
      <p style="font-size:13px;color:${C.inkSoft};margin:0 0 16px">Total: ${dg.cumGold}g, ${dg.cumXp}xp${dropsStr ? `, ${dropsStr}` : ""}</p>
      <button data-act="claimDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.gold};color:white">Claim Rewards</button>`;
  } else if (room.type === "combat" || room.type === "boss") {
    const pct = (room.enemyHp / room.enemyMaxHp) * 100;
    const logLines = room.log.map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
    const bossAddBar = (room.type === "boss" && room.bossAdd && room.bossAdd.hp > 0) ? `
      <div style="padding:8px 10px;border-radius:12px;margin-bottom:12px;background:${C.creamDeep};border:1px solid ${C.border}">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:12px;font-weight:600;color:${C.ink}">${room.bossAdd.icon} ${room.bossAdd.name}</span>
          <button data-act="attackDungeonBossAdd" class="disp" style="padding:3px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.mageDeep};color:white">Attack</button>
        </div>
        <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.card}">
          <div style="height:6px;width:${(room.bossAdd.hp/room.bossAdd.maxHp)*100}%;background:${C.gold};transition:width .3s"></div>
        </div>
      </div>` : "";
    const debuffNote = (room.hitPenaltyRounds > 0) ? `<p style="font-size:10.5px;color:${C.pink};margin:0 0 8px">⚠️ -${room.hitPenalty} to-hit for ${room.hitPenaltyRounds} more round${room.hitPenaltyRounds>1?"s":""}</p>` : "";
    body = `
      <p class="disp" style="font-weight:700;font-size:13px;margin:0 0 8px">${room.type === "boss" ? "👹 " : ""}${room.enemyName}${room.type === "boss" ? " · Boss Room" : ""}</p>
      <div style="height:10px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-bottom:12px">
        <div style="height:10px;width:${pct}%;background:${C.pink};transition:width .3s"></div>
      </div>
      ${bossAddBar}
      ${debuffNote}
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><span style="font-size:12px;color:${C.inkSoft}">❤️ Your HP</span><span style="font-size:12px;font-weight:700;color:${C.ink}">${state.player.hp}/${maxHp()}</span></div>
      <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px;max-height:110px;overflow-y:auto">${logLines}</div>
      ${!room.resolved
        ? `${renderSpellPicker("castDungeonSpell")}
           ${(state.potions.health_draught>0 || state.potions.greater_health_draught>0) ? `<button data-act="usePotionInFight" class="disp" style="width:100%;padding:10px;border-radius:16px;font-weight:600;margin-top:4px;background:${C.sageSoft};color:${C.sage}">🧪 Drink Potion</button>` : ""}`
        : `<button data-act="continueDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.mageDeep};color:white">${room.type === "boss" ? "Continue to Rewards" : "Continue Deeper"}</button>`}`;
  } else if (room.type === "trap") {
    const logLines = (room.log||[]).map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
    body = `
      <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 8px">🪤 A Trap</p>
      <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">Something's rigged in this passage. Proceed carefully, or risk it.</p>
      <div style="margin-bottom:12px">${logLines}</div>
      ${!room.resolved
        ? `<button data-act="resolveDungeonTrap" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.mage}, ${C.mageDeep});color:white">Proceed Carefully</button>`
        : `<button data-act="continueDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.mageDeep};color:white">Continue Deeper</button>`}`;
  } else if (room.type === "treasure") {
    const logLines = (room.log||[]).map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
    body = `
      <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 8px">📦 A Quiet Room</p>
      <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">Nothing dangerous here — just worth searching.</p>
      <div style="margin-bottom:12px">${logLines}</div>
      ${!room.resolved
        ? `<button data-act="collectDungeonTreasure" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.gold};color:white">Search the Room</button>`
        : `<button data-act="continueDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.mageDeep};color:white">Continue Deeper</button>`}`;
  } else if (room.type === "rest") {
    const logLines = (room.log||[]).map(l => `<p style="font-size:12.5px;color:${C.inkSoft};margin:0">${escapeHtml(l)}</p>`).join("");
    body = `
      <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 8px">🌙 A Safe Alcove</p>
      <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">Quiet enough to catch your breath before going on.</p>
      <div style="margin-bottom:12px">${logLines}</div>
      ${!room.resolved
        ? `<button data-act="restDungeonRoom" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.sage};color:white">Rest a Moment</button>`
        : `<button data-act="continueDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.mageDeep};color:white">Continue Deeper</button>`}`;
  } else if (room.type === "branch") {
    body = !room.resolved
      ? `
        <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 6px">🔀 A Fork</p>
        <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">${room.intro}</p>
        <div style="display:flex;flex-direction:column;gap:8px">${room.options.map((opt,i) => `<button data-act="chooseDungeonBranch" data-arg="${i}" class="disp" style="padding:12px;border-radius:16px;font-size:13px;font-weight:600;background:${C.mageSoft};color:${C.mageDeep};text-align:left">${opt.label}</button>`).join("")}</div>`
      : `
        <p class="disp" style="font-weight:700;font-size:14px;margin:0 0 8px">🔀 A Fork</p>
        <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">You chose: ${room.chosenLabel}</p>
        <button data-act="continueDungeon" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:${C.mageDeep};color:white">Continue Deeper</button>`;
  }

  return `<div style="position:fixed;inset:0;z-index:52;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.45)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">🕯️ Dungeon Crawl · Room ${Math.min(dg.roomIndex+1, DUNGEON_ROOMS.length)}/${DUNGEON_ROOMS.length}</p>
        ${closeBtn}
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px">${roomDots}</div>
      ${body}
    </div>
  </div>`;
}

function renderBackupModal() {
  if (!ui.showBackup) return "";
  const backupText = escapeHtml(JSON.stringify(state));
  return `<div style="position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.45)">

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">Backup & Restore</p>

      <div style="border-top:1px solid ${C.border};margin-top:16px;padding-top:16px">
        <p style="font-size:12px;color:${C.inkSoft};margin:0 0 8px">Restore from a backup:</p>
        <textarea id="importTextarea" placeholder="Paste your saved backup text here…" style="width:100%;height:70px;font-size:10px;background:${C.creamDeep};border:1px solid ${C.border};border-radius:12px;padding:8px;color:${C.ink}"></textarea>
        <button data-act="restoreBackup" class="disp" style="width:100%;padding:10px;border-radius:16px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;background:${C.gold};color:white;font-weight:600;font-size:13px"><span>📥</span><span>Restore</span></button>
      </div>
      <p id="backupMsg" style="font-size:12px;color:${C.mageDeep};margin-top:10px;text-align:center">${escapeHtml(ui.importMsg)}</p>
    </div>
  </div>`;
}

function renderStoryModal() {
  if (!ui.showStory) return "";
  const ch = currentChapter();
  if (!ch) { ui.showStory = false; return ""; }
  const page = ch.pages[ui.storyPage];
  const isLastPage = ui.storyPage >= ch.pages.length - 1;
  const dots = ch.pages.map((_,i) => `<span style="width:6px;height:6px;border-radius:6px;background:${i===ui.storyPage ? C.mageDeep : C.creamDeep}"></span>`).join("");
  const showChoice = isLastPage && ch.choice;
  return `<div style="position:fixed;inset:0;z-index:57;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">${ch.icon} ${ch.title}</p>
        <button data-act="closeStory"><span style="color:${C.inkSoft}">✖</span></button>
      </div>
      <p style="font-size:13.5px;line-height:1.6;color:${C.ink};min-height:110px">${escapeHtml(page)}</p>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin:12px 0 16px">${dots}</div>
      ${showChoice
        ? `<div style="display:flex;flex-direction:column;gap:8px">${ch.choice.options.map((opt,i) => `<button data-act="storyChoice" data-arg="${i}" class="disp" style="padding:12px;border-radius:16px;font-size:13px;font-weight:600;background:${C.mageSoft};color:${C.mageDeep};text-align:left">${opt.label}</button>`).join("")}</div>`
        : `<button data-act="storyNext" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.mage}, ${C.mageDeep});color:white">${isLastPage ? "Finish Chapter" : "Continue"}</button>`}
    </div>
  </div>`;
}

function renderStrongholdModal() {
  if (!ui.showStronghold) return "";
  const s = currentStrongholdStage();
  if (!s) { ui.showStronghold = false; return ""; }
  const page = s.pages[ui.strongholdPage];
  const isLastPage = ui.strongholdPage >= s.pages.length - 1;
  const dots = s.pages.map((_,i) => `<span style="width:6px;height:6px;border-radius:6px;background:${i===ui.strongholdPage ? C.mageDeep : C.creamDeep}"></span>`).join("");
  const showChoice = isLastPage && s.choice;
  return `<div style="position:fixed;inset:0;z-index:57;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <p class="disp" style="font-weight:700;font-size:15px;margin:0">${s.icon} ${s.title}</p>
        <button data-act="closeStronghold"><span style="color:${C.inkSoft}">✖</span></button>
      </div>
      <p style="font-size:13.5px;line-height:1.6;color:${C.ink};min-height:110px">${escapeHtml(page)}</p>
      <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin:12px 0 16px">${dots}</div>
      ${showChoice
        ? `<div style="display:flex;flex-direction:column;gap:8px">${s.choice.options.map((opt,i) => `<button data-act="strongholdChoice" data-arg="${i}" class="disp" style="padding:12px;border-radius:16px;font-size:13px;font-weight:600;background:${C.mageSoft};color:${C.mageDeep};text-align:left">${opt.label}</button>`).join("")}</div>`
        : `<button data-act="strongholdNext" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.mage}, ${C.mageDeep});color:white">${isLastPage ? "Finish Stage" : "Continue"}</button>`}
    </div>
  </div>`;
}

function renderSkirmishModal() {
  if (!ui.skirmish) return "";
  const enc = ui.skirmish;
  return `<div style="position:fixed;inset:0;z-index:56;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px;text-align:center">
      <p style="font-size:40px;margin:0 0 8px">${enc.icon}</p>
      <p class="disp" style="font-weight:700;font-size:16px;margin:0 0 4px">A wild ${enc.name} appears!</p>
      <p style="font-size:12px;color:${C.inkSoft};margin:0 0 16px">A quick skirmish — no Focus needed.</p>
      <button data-act="fightSkirmish" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.mage}, ${C.mageDeep});color:white">⚔️ Strike!</button>
    </div>
  </div>`;
}

function renderChestModal() {
  if (!ui.showChest) return "";
  return `<div style="position:fixed;inset:0;z-index:55;display:flex;align-items:flex-end;justify-content:center;background:rgba(74,59,50,.5)">
    <div style="background:${C.card};border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px">
      <p class="disp" style="font-weight:700;font-size:16px;margin:0 0 6px">📦 A Sealed Chest</p>
      <p style="font-size:12.5px;color:${C.inkSoft};margin:0 0 16px">Half-buried near the path, an old chest sealed with a merchant's mark. Crack it open now, or bring it to Aisyah unopened?</p>
      <button data-act="chestChoice" data-arg="open" class="disp" style="width:100%;padding:12px;border-radius:16px;margin-bottom:8px;font-weight:600;background:linear-gradient(135deg, ${C.gold}, ${C.pink});color:white">Break the seal now (+80g +20xp)</button>
      <button data-act="chestChoice" data-arg="aisyah" class="disp" style="width:100%;padding:12px;border-radius:16px;font-weight:600;background:linear-gradient(135deg, ${C.mage}, ${C.mageDeep});color:white">Bring it to Aisyah unopened (permanent gold bonus)</button>
    </div>
  </div>`;
}

function renderNav() {
  const tabs = [["home","🪄","Home"], ["explore","🧭","Explore"], ["party","👥","Party"], ["quests","📜","Quests"], ["craft","🔨","Craft"], ["calendar","📦","Calendar"]];
  const items = tabs.map(([id,icon,label]) => `
    <button data-act="setTab" data-arg="${id}" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;flex:1;color:${ui.tab===id ? C.mageDeep : C.inkSoft}">
      <span style="font-size:18px">${icon}</span>
      <span style="font-size:11px;font-weight:${ui.tab===id?700:500}">${label}</span>
    </button>`).join("");
  return `<div style="position:fixed;bottom:0;left:0;right:0;display:flex;background:${C.card};border-top:1px solid ${C.border}">${items}</div>`;
}

function renderContent() {
  if (ui.tab === "home") return renderHome();
  if (ui.tab === "explore") return renderExplore();
  if (ui.tab === "party") return renderParty();
  if (ui.tab === "quests") return renderQuests();
  if (ui.tab === "craft") return renderCraft();
  if (ui.tab === "calendar") return renderCalendar();
  return "";
}

function render() {
  ensureDaily();
  const html = `
    ${renderHeader()}
    ${renderToast()}
    <div style="padding:20px 20px 96px">${renderContent()}</div>
    ${renderEncounterModal()}
    ${renderExpeditionModal()}
    ${renderDungeonModal()}
    ${renderSpecPickerModal()}
    ${renderRepBonusModal()}
    ${renderStoryModal()}
    ${renderStrongholdModal()}
    ${renderSkirmishModal()}
    ${renderChestModal()}
    ${renderBackupModal()}
    ${renderNav()}
  `;
  document.getElementById("app").innerHTML = html;
}

/* ================= init ================= */
load();
render();
setInterval(() => { ui.now = Date.now(); if (!ui.showBackup) render(); }, 20000);
</script>
</body>
</html>
