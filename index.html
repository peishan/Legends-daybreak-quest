function pickBossForLevel(level) {
  const bucket = level < 10 ? 1 : Math.floor(level/10) * 10;
  let pool = BOSSES.filter(b => b.minLv === bucket);
  if (!pool.length) pool = BOSSES.filter(b => b.minLv <= level && b.minLv >= 50);
  if (!pool.length) pool = BOSSES.filter(b => b.minLv <= level);
  return pool[hashDay(today() + "-boss") % pool.length];
}

/* ================= pure helpers ================= */
const dayKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const hashDay = (s) => { let h = 0; for (let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) >>> 0; return h; };
const encounterForDate = (dateStr) => ENCOUNTER_CYCLE[hashDay(dateStr) % ENCOUNTER_CYCLE.length];
const today = () => dayKey(new Date());
const xpToNext = (level) => 50 + level * 25;
const fmtMs = (ms) => { const m = Math.max(1, Math.ceil(ms/60000)); return m < 60 ? `${m}m` : `${Math.floor(m/60)}h ${m%60}m`; };
const escapeHtml = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function isoWeekKey(d) {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil(((date - yearStart) / 86400000 + 1) / 7);
  return `${date.getUTCFullYear()}-W${weekNo}`;
}

function effectiveChargeCap() { return CHARGE_CAP + (state.ascensionRank||0); }

function nextAscensionLevel() { return 100 + (state.ascensionRank||0) * 15; }
function canAscend() { return state.player.level >= nextAscensionLevel(); }
function ascensionTitle(rank) { return rank <= 0 ? null : `Ascended ${rank}`; }

  while (picked.length < 2 && idxs.length) {
    s = (s * 1103515245 + 12345) >>> 0;
    picked.push(idxs.splice(s % idxs.length, 1)[0]);
  }
  return picked.map(i => BOUNTY_POOL[i]);
}
function weeklyCallsCount() {
  const wk = isoWeekKey(new Date());
  return Object.entries(state.daysLog).reduce((sum, [dateStr, entry]) =>
    isoWeekKey(new Date(dateStr)) === wk ? sum + (entry.count||0) : sum, 0);
}

function raidCost() { return state.equipment.trinket === "forgemasters_seal" ? 3 : 4; }

function rollEnemyCount(level) {
  if (level < 5) return 1;

  if (roll < 0.5) return 1;

function beginCall() {

function rollD20() { return 1 + Math.floor(Math.random()*20); }
function rollDice(count, sides) { let t = 0; for (let i=0;i<count;i++) t += 1 + Math.floor(Math.random()*sides); return t; }

function encAllDefeated(enc) {
  if (enc.enemies) return enc.enemies.every(e => e.hp <= 0);
  return enc.enemyHp <= 0;
}
function encDealDamage(enc, dmg, targetIdx) {
  if (enc.enemies) {
    const idx = targetIdx !== undefined ? targetIdx : enc.targetIndex;
    const target = enc.enemies[idx];
    if (!target) return;
    target.hp = Math.max(0, target.hp - dmg);
    if (target.hp <= 0 && idx === enc.targetIndex) {
      const nextAlive = enc.enemies.findIndex(e => e.hp > 0);
      if (nextAlive >= 0) enc.targetIndex = nextAlive;
    }
  } else {
    enc.enemyHp = Math.max(0, enc.enemyHp - dmg);
  }
}
function encRandomAliveIndex(enc) {
  if (!enc.enemies) return -1;
  const aliveIdxs = enc.enemies.map((e,i)=>i).filter(i => enc.enemies[i].hp > 0);
  if (!aliveIdxs.length) return -1;
  return aliveIdxs[Math.floor(Math.random()*aliveIdxs.length)];
}
function selectTarget(idx) {
  const enc = ui.encounter;
  if (!enc || !enc.enemies) return;
  const i = parseInt(idx, 10);
  if (enc.enemies[i] && enc.enemies[i].hp > 0) { enc.targetIndex = i; render(); }
}

function rollAndApplyDamage(enc, isBoss, spell) {
  const eb = equippedBonus();
  const abs = abilityScores();
  const dexMod = abilityMod(abs.dex);
  const intMod = abilityMod(abs.int);
  const focusBonus = state.focusBuff > 0 ? 2 : 0;
  const evokerMult = state.specialization === "evoker" ? 1.15 : 1;
  const divinerBonus = state.specialization === "diviner" ? 2 : 0;

  if (spell.autoHit) {
    let dmg = Math.round((rollDice(spell.diceCount, spell.diceSides) + (spell.flatBonus||0) + intMod + focusBonus) * evokerMult);
    encDealDamage(enc, dmg);
    enc.log.push(`${spell.name} strikes true for ${dmg} damage.`);
    pushFx("enemy", `-${dmg}`, "hit");
    if (spell.vampiric) { const heal = state.specialization === "necromancer" ? dmg : Math.round(dmg/2); state.player.hp = Math.min(maxHp(), state.player.hp + heal); enc.log.push(`You drain ${heal} HP back.`); pushFx("player", `+${heal}`, "heal"); }
    if (spell.fullHeal) { state.player.hp = maxHp(); enc.log.push(`You're restored completely — ${maxHp()}/${maxHp()} HP.`); pushFx("player", "FULL HEAL", "heal"); }
    if (spell.dot) enc.acidTick = rollDice(spell.dotDice[0], spell.dotDice[1]);
    return;
  }

  const luckBonus = eb.luck + familiarLuckBonus();
  const debuffPenalty = (enc.hitPenaltyRounds > 0) ? (enc.hitPenalty||0) : 0;
  const hitBonus = Math.floor(state.player.level/4) + luckBonus + dexMod + divinerBonus - debuffPenalty;
  const AC = isBoss ? 12 : 9;
  const roll = rollD20();

  if (roll === 1) {
    enc.log.push(`${spell.name} fizzles completely on a natural 1.`);
    pushFx("enemy", "FIZZLE", "fumble");
    return;
  }
  const isCrit = roll === 20;
  const total = roll + hitBonus;
  if (!isCrit && total < AC) {
    enc.log.push(`You roll ${roll} (+${hitBonus} = ${total}) vs AC ${AC} — ${spell.name} slips past.`);
    pushFx("enemy", "MISS", "miss");
    return;
  }
  let dmg = Math.round((rollDice(spell.diceCount, spell.diceSides) + Math.round(state.player.level*0.8) + eb.atk + intMod + focusBonus + (passiveActive("zaki")?2:0)) * evokerMult);
  if (isCrit) dmg = dmg * 2;
  encDealDamage(enc, dmg);
  enc.log.push(isCrit ? `Natural 20! ${spell.name} critically hits for ${dmg} damage!` : `You roll ${roll} (+${hitBonus} = ${total}) — ${spell.name} hits for ${dmg} damage.`);
  pushFx("enemy", `-${dmg}`, isCrit ? "crit" : "hit");
  if (spell.vampiric) { const heal = state.specialization === "necromancer" ? dmg : Math.round(dmg/2); state.player.hp = Math.min(maxHp(), state.player.hp + heal); enc.log.push(`You drain ${heal} HP back.`); pushFx("player", `+${heal}`, "heal"); }
  if (spell.dot) enc.acidTick = rollDice(spell.dotDice[0], spell.dotDice[1]);
}

function performSpell(enc, isBoss, spellId) {
  const spell = SPELLS.find(s => s.id === spellId) || SPELLS[0];
  const isHasteFamily = spell.kind === "buff" && (spell.effect === "haste" || spell.effect === "improved_haste" || spell.effect === "time_stop");
  const effectiveCost = (isHasteFamily && state.specialization === "enchanter") ? Math.round(spell.mpCost * 0.7) : spell.mpCost;
  if (state.player.level < spell.unlockLv || state.player.mp < effectiveCost) return;
  state.player.mp -= effectiveCost;

  if (enc.acidTick) {
    encDealDamage(enc, enc.acidTick);
    enc.log.push(`The acid burns for ${enc.acidTick} more damage.`);
    enc.acidTick = 0;
    if (encAllDefeated(enc)) return;
  }

  if (spell.kind === "buff") {
    if (spell.effect === "haste") {
      enc.log.push("You cast Haste — time seems to slow around you.");
      rollAndApplyDamage(enc, isBoss, SPELLS[0]);
      if (!encAllDefeated(enc)) rollAndApplyDamage(enc, isBoss, SPELLS[0]);
    } else if (spell.effect === "improved_haste") {
      enc.log.push("You cast Improved Haste — you move in triplicate.");
      for (let i=0;i<3 && !encAllDefeated(enc);i++) rollAndApplyDamage(enc, isBoss, SPELLS[0]);
    } else if (spell.effect === "time_stop") {
      enc.log.push("You cast Time Stop — the world holds still around you.");
      for (let i=0;i<4 && !encAllDefeated(enc);i++) rollAndApplyDamage(enc, isBoss, SPELLS[0]);
    } else if (spell.effect === "stoneskin") {
      enc.log.push("Your skin turns to stone — the next blow will glance off.");
      enc.stoneskinReady = true;
    }
    return;
  }

  rollAndApplyDamage(enc, isBoss, spell);
}

function applyPartyStrikes(enc, isBoss) {
  const strMod = abilityMod(abilityScores().str);
  const leveledCompanions = [];
  (state.activeParty||[]).forEach(pid => {
    if (encAllDefeated(enc)) return;
    const member = PARTY.find(p => p.id === pid);
    if (!member || state.player.level < member.unlockLv) return;
    const equipped = state.companionEquipment[pid] || {};
    const slotKeys = ["weapon","armor","trinket","amulet","cloak","ring1","ring2"];
    let gearHit = 0, gearDmg = 0;
    slotKeys.forEach(sk => {
      const item = equipped[sk] ? COMPANION_GEAR.find(g => g.id === equipped[sk]) : null;
      if (item) { gearHit += item.hitBonus; gearDmg += item.dmgBonus; }
    });
    const lvlBonus = companionLevelBonus(pid);
    const roll = rollD20();
    const hitBonus = Math.floor(state.player.level/4) + gearHit + Math.floor(lvlBonus/3);
    const AC = isBoss ? 12 : 9;
    const targetIdx = enc.enemies ? encRandomAliveIndex(enc) : undefined;
    const targetName = enc.enemies ? (enc.enemies[targetIdx] ? enc.enemies[targetIdx].name : member.name) : null;
    if (gainCompanionXp(pid, 2)) leveledCompanions.push(member.name);
    if (roll === 1) { enc.log.push(`${member.name} swings and misses completely.`); return; }
    const isCrit = roll === 20;
    if (!isCrit && roll + hitBonus < AC) { enc.log.push(`${member.name}'s strike glances off.`); return; }
    let pdmg = rollDice(1,6) + Math.round(2 + state.player.level*0.5) + strMod + gearDmg + lvlBonus;
    if (isCrit) pdmg = pdmg * 2;
    encDealDamage(enc, pdmg, targetIdx);
    enc.log.push(`${member.name} strikes ${targetName ? targetName+" " : ""}for ${pdmg}${isCrit ? " (critical!)" : ""}.`);
  });
  if (leveledCompanions.length) {
    setTimeout(() => showToast(`${leveledCompanions.join(", ")} leveled up!`), 350);
  }
}

function triggerBossAbility(enc, boss) {
  const ability = boss.ability;
  if (!ability) return;
  if (ability.type === "heal") {
    const healAmt = Math.max(1, Math.round(enc.enemyMaxHp * ability.frac));
    enc.enemyHp = Math.min(enc.enemyMaxHp, enc.enemyHp + healAmt);
    enc.log.push(`${ability.line} (+${healAmt} HP)`);
  } else if (ability.type === "debuff") {
    if (ability.stat === "hit") {
      enc.hitPenalty = ability.amount;
      enc.hitPenaltyRounds = ability.rounds;
      enc.log.push(`${ability.line} (-${ability.amount} to-hit for ${ability.rounds} rounds)`);
    } else if (ability.stat === "mp") {
      const drained = Math.min(state.player.mp, ability.amount);
      state.player.mp -= drained;
      enc.log.push(`${ability.line} (-${drained} MP)`);
    }
  } else if (ability.type === "summon") {
    if (!enc.bossAdd || enc.bossAdd.hp <= 0) {
      const addMaxHp = Math.max(5, Math.round(enc.enemyMaxHp * ability.hpFrac));
      enc.bossAdd = { name: ability.name, icon: ability.icon, hp: addMaxHp, maxHp: addMaxHp };
      enc.log.push(`${ability.line} (${ability.name} joins the fight)`);
    } else {
      enc.log.push(ability.line);
    }
  }
}

function attackBossAddCore(enc) {
  if (!enc || enc.resolved || !enc.bossAdd || enc.bossAdd.hp <= 0) return;
  const abs = abilityScores();
  const debuffPenalty = (enc.hitPenaltyRounds > 0) ? (enc.hitPenalty||0) : 0;
  const hitBonus = Math.floor(state.player.level/4) + abilityMod(abs.dex) - debuffPenalty;
  const roll = rollD20();
  if (roll === 1) {
    enc.log.push(`You swing at ${enc.bossAdd.name} and miss completely.`);
  } else {
    const isCrit = roll === 20;
    const AC = 8;
    if (!isCrit && roll + hitBonus < AC) {
      enc.log.push(`You roll ${roll} (+${hitBonus}) vs AC ${AC} — your strike on ${enc.bossAdd.name} misses.`);
    } else {
      let dmg = rollDice(2,6) + Math.round(state.player.level*0.6) + abilityMod(abs.int);
      if (isCrit) dmg = dmg * 2;
      enc.bossAdd.hp = Math.max(0, enc.bossAdd.hp - dmg);
      enc.log.push(`You strike ${enc.bossAdd.name} for ${dmg}${enc.bossAdd.hp <= 0 ? " — it's destroyed!" : ""}.`);
    }
  }
  resolveBossRoundAftermath(enc);
}
function attackBossAdd() { attackBossAddCore(ui.encounter); }

function resolveBossRoundAftermath(enc) {
  if (enc.hitPenaltyRounds > 0) { enc.hitPenaltyRounds -= 1; if (enc.hitPenaltyRounds <= 0) enc.hitPenalty = 0; }
  const boss = BOSSES.find(b => b.id === enc.bossId);
  const ratio = enc.enemyHp / enc.enemyMaxHp;
  if (enc.phaseSeen === 0 && ratio <= 0.66) { enc.log.push(boss.phaseLines[0]); enc.phaseSeen = 1; triggerBossAbility(enc, boss); }
  else if (enc.phaseSeen === 1 && ratio <= 0.33) { enc.log.push(boss.phaseLines[1]); enc.phaseSeen = 2; triggerBossAbility(enc, boss); }
  if (enc.stoneskinReady) {
    enc.log.push("Your Stoneskin absorbs the blow completely!");
    enc.stoneskinReady = false;
    pushFx("player", "BLOCKED", "miss");
  } else {
    const wisMod = abilityMod(abilityScores().wis);
    let baseRetaliation = enc.isRaid ? Math.round(7 + Math.random()*9) : Math.round(3 + Math.random()*5);
    if (enc.bossAdd && enc.bossAdd.hp > 0) baseRetaliation += 3;
    let retaliation = Math.max(1, baseRetaliation - wisMod);
    if (state.specialization === "abjurer") retaliation = Math.max(1, Math.round(retaliation * 0.75));
    state.player.hp = Math.max(1, state.player.hp - retaliation);
    enc.log.push(`It hits back for ${retaliation} damage. (${state.player.hp}/${maxHp()} HP)`);
    pushFx("player", `-${retaliation}`, "retaliation");
  }
  save(); render();
}

function castSpell(spellId) {
  const enc = ui.encounter;
  if (!enc || enc.resolved) return;
  performSpell(enc, enc.isBoss, spellId || "arcane_bolt");
  applyPartyStrikes(enc, enc.isBoss);

  if (encAllDefeated(enc)) { resolveVictory(); render(); return; }

  if (enc.isBoss) {
    resolveBossRoundAftermath(enc);
    return;
  } else if (enc.enemies) {
    const aliveCount = enc.enemies.filter(e => e.hp > 0).length;
    if (aliveCount >= 2) {
      if (enc.stoneskinReady) {
        enc.log.push("Your Stoneskin absorbs the blow completely!");
        enc.stoneskinReady = false;
      } else {
        const wisMod = abilityMod(abilityScores().wis);
        const retaliation = Math.max(0, Math.round(1 + Math.random()*3) - wisMod);
        if (retaliation > 0) {
          state.player.hp = Math.max(1, state.player.hp - retaliation);
          enc.log.push(`Surrounded by ${aliveCount} — you take ${retaliation} damage. (${state.player.hp}/${maxHp()} HP)`);
        }
      }
      save();
    }
  }
  render();
}

function resolveVictory() {
  const enc = ui.encounter;
  const isBoss = enc.isBoss;
  const enemyCount = enc.enemies ? enc.enemies.length : 1;
  const mult = (isBoss ? 3 : 1) * (enc.isRaid ? 2.2 : 1) * (enc.enemies ? (0.7 + enemyCount*0.4) : 1);
  const goldBonus = (passiveActive("aisyah") ? (state.questFlags.aisyahBonus ? 1.35 : 1.2) : 1) * (1 + abilityMod(abilityScores().cha)*0.05);
  const xpBonus = passiveActive("mezstorm") ? 1.15 : 1;
  const baseGold = Math.round((6 + Math.random()*8) * goldBonus * mult);
  const baseXp = Math.round((10 + Math.random()*8 + state.streak) * xpBonus * mult);
  const dropCount = (Math.random() < (passiveActive("senedra")?0.65:0.4) ? 2 : 1) + (isBoss ? 2 : 0) + (enc.isRaid ? 2 : 0) + Math.max(0, enemyCount-1);
  const drops = {};
  for (let i=0;i<dropCount;i++){ const m = MATERIALS[Math.floor(Math.random()*MATERIALS.length)]; drops[m]=(drops[m]||0)+1; }
  if (isBoss) {
    drops["Legend Shard"] = (drops["Legend Shard"]||0) + (state.player.level >= 40 ? 2 : 1) + (enc.isRaid ? 2 : 0);
    if (enc.bossId === "relapse_tide" || enc.bossId === "comparison_specter") {
      drops["Echo Shard"] = (drops["Echo Shard"]||0) + 1 + (enc.isRaid ? 1 : 0);
    }
    if (enc.isRaid && state.player.level >= 60) {
      drops["Ascendant Core"] = (drops["Ascendant Core"]||0) + 1;
    }
  }
  enc.resolved = true;
  const victoryLine = isBoss ? `${enc.enemyName} shatters into scattered light.`
    : enc.enemies ? (enemyCount > 1 ? "The last of them dissolves into motes of light." : `${enc.enemies[0].name} dissolves into motes of light.`)
    : `${enc.enemyName} dissolves into motes of light.`;
  enc.log.push(victoryLine, `+${baseGold} gold, +${baseXp} XP`);
  enc.reward = { gold: baseGold, xp: baseXp, drops };
}

function claimCall() {
  const enc = ui.encounter;
  if (!enc || !enc.resolved) return;
  const { gold, xp, drops } = enc.reward;
  const cost = enc.cost || 1;
  const wasBoss = enc.isBoss;
  const t = today();
  const tLog = todayLog();
  ensureDaily();

  const isNewDay = state.lastCheckInDate !== t;
  const prevDate = state.lastCheckInDate ? new Date(state.lastCheckInDate) : null;
  const wasYesterday = prevDate && (new Date(t) - prevDate)/86400000 === 1;
  const newStreak = isNewDay ? (wasYesterday || !prevDate ? (prevDate ? state.streak+1 : 1) : 1) : state.streak;

  let newXp = state.player.xp + xp, newLevel = state.player.level;
  let newMaxHp = state.player.maxHp, newMaxMp = state.player.maxMp, leveledUp = false;
  while (newXp >= xpToNext(newLevel)) { newXp -= xpToNext(newLevel); newLevel++; newMaxHp += 8; newMaxMp += 4; leveledUp = true; }

  Object.entries(drops).forEach(([m,q]) => { state.materials[m] = (state.materials[m]||0) + q; state.dailyLog.materialsGathered += q; });

  const dayEntry = { count: tLog.count + 1, encounter: tLog.encounter, bossDone: tLog.bossDone || (wasBoss && !enc.isRaid) };
  const newGuildDays = tLog.encounter === "Guild Day" && tLog.count === 0 ? state.guildDays + 1 : state.guildDays;
  if (wasBoss) { state.bossesDefeated = (state.bossesDefeated||0) + 1; state.bossesKilled[enc.bossId] = (state.bossesKilled[enc.bossId]||0) + 1; if (enc.isRaid) state.raidsCompleted = (state.raidsCompleted||0) + 1; }
  else if (enc.enemies) enc.enemies.forEach(e => trackKill(e.name));
  else trackKill(enc.enemyName);

  const spent = spendCharge(state, ui.now, cost);
  if (!spent) { ui.encounter = null; render(); return; }

  const unlockedIds = PARTY.filter(m => newLevel >= m.unlockLv).map(m => m.id);
  const chosen = unlockedIds[Math.floor(Math.random()*unlockedIds.length)];
  const newAff = (state.affinity[chosen]||0) + 1;
  const hitSnippet = (SNIPPETS[chosen]||[]).find(sn => sn.at === newAff);

  state.player.xp = newXp; state.player.level = newLevel;

const DUNGEON_COST = 4;

function beginDungeon() {

function advanceDungeonRoom() {
  const dg = ui.dungeon;
  dg.roomIndex += 1;
  if (dg.roomIndex >= DUNGEON_ROOMS.length) { dg.resolved = true; dg.roomState = { type:"complete" }; return; }
  const template = DUNGEON_ROOMS[dg.roomIndex];
  const type = dg.overrideType || template.type;
  dg.overrideType = null;
  if (type === "combat") {
    const enemy = ENEMIES[Math.floor(Math.random()*ENEMIES.length)];

    dg.roomState = { type:"combat", enemyName:enemy.name, enemyHp:enemyMaxHp, enemyMaxHp, log:[enemy.intro], resolved:false };
  } else if (type === "boss") {
    const boss = pickBossForLevel(state.player.level);
    const enemyMaxHp = Math.round((18 + state.player.level*6) * boss.hpMult * 1.3);
    dg.roomState = { type:"boss", isBoss:true, bossId:boss.id, enemyName:boss.name, phaseSeen:0, enemyHp:enemyMaxHp, enemyMaxHp, log:[boss.intro], resolved:false };
  } else if (type === "trap") {
    dg.roomState = { type:"trap", resolved:false, log:[] };
  } else if (type === "treasure") {
    dg.roomState = { type:"treasure", resolved:false, log:[] };
  } else if (type === "rest") {
    dg.roomState = { type:"rest", resolved:false, log:[] };
  } else if (type === "branch") {
    dg.roomState = { type:"branch", options:template.options, intro:template.intro, resolved:false };
  }

function resolveDungeonCombatVictory(room) {
  const dg = ui.dungeon;
  const goldBonus = (passiveActive("aisyah") ? (state.questFlags.aisyahBonus ? 1.35 : 1.2) : 1) * (1 + abilityMod(abilityScores().cha)*0.05);
  const xpBonus = passiveActive("mezstorm") ? 1.15 : 1;
  const mult = room.type === "boss" ? 3 : 1;
  const g = Math.round((6 + Math.random()*8) * goldBonus * mult);
  const x = Math.round((10 + Math.random()*8) * xpBonus * mult);
  dg.cumGold += g; dg.cumXp += x;
  if (Math.random() < 0.5) { const m = MATERIALS[Math.floor(Math.random()*MATERIALS.length)]; dg.cumDrops[m] = (dg.cumDrops[m]||0) + 1; }
  if (room.type === "boss") {
    dg.cumDrops["Legend Shard"] = (dg.cumDrops["Legend Shard"]||0) + (state.player.level >= 40 ? 2 : 1);
    state.bossesDefeated = (state.bossesDefeated||0) + 1;
  }

function castExpeditionSpell(spellId) {
  const exp = ui.expedition;
  if (!exp || exp.resolved) return;
  const isFinalWave = exp.wave === EXPEDITION_WAVES;
  performSpell(exp, isFinalWave, spellId || "arcane_bolt");
  applyPartyStrikes(exp, isFinalWave);

  if (exp.enemyHp <= 0) {
    const goldBonus = (passiveActive("aisyah") ? (state.questFlags.aisyahBonus ? 1.35 : 1.2) : 1) * (1 + abilityMod(abilityScores().cha)*0.05);
    const xpBonus = passiveActive("mezstorm") ? 1.15 : 1;
    const g = Math.round((5 + Math.random()*6) * goldBonus);
    const x = Math.round((8 + Math.random()*6) * xpBonus);
    exp.cumGold += g; exp.cumXp += x;
    if (Math.random() < 0.5) { const m = MATERIALS[Math.floor(Math.random()*MATERIALS.length)]; exp.drops[m] = (exp.drops[m]||0) + 1; }
    exp.log.push(`${exp.enemyName} falls. (+${g}g +${x}xp)`);
    if (exp.wave < EXPEDITION_WAVES) {
      exp.wave += 1;
      const nextEnemy = ENEMIES[Math.floor(Math.random()*ENEMIES.length)];
      const mult = exp.wave === EXPEDITION_WAVES ? 1.5 : 1.15;
      exp.enemyName = nextEnemy.name;
      exp.enemyMaxHp = Math.round((16 + state.player.level*5) * nextEnemy.hpMod * mult);
      exp.enemyHp = exp.enemyMaxHp;
      exp.log.push(`Wave ${exp.wave}${exp.wave === EXPEDITION_WAVES ? " — a tougher foe emerges" : ""}: ${nextEnemy.intro}`);
    } else {
      exp.resolved = true;
      exp.cumGold += 15; exp.cumXp += 15;
      exp.log.push("The expedition is clear. (+15g +15xp completion bonus)");
    }
    render();
    return;
  }

  if (isFinalWave) {
    if (exp.stoneskinReady) {
      exp.log.push("Your Stoneskin absorbs the blow completely!");
      exp.stoneskinReady = false;
    } else {
      const wisMod = abilityMod(abilityScores().wis);
      const retaliation = Math.max(1, Math.round(3 + Math.random()*4) - wisMod);
      state.player.hp = Math.max(1, state.player.hp - retaliation);
      exp.log.push(`It hits back for ${retaliation} damage. (${state.player.hp}/${maxHp()} HP)`);
    }
    save();
  } else {
    exp.log.push("It strikes back, but you hold your ground.");
  }
  render();
}

function insightsSummary(days) {
  const entries = [];
  for (let i = 1; i <= days; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const key = dayKey(d);
    if (state.wellnessLog[key]) entries.push(state.wellnessLog[key]);
  }
  const count = entries.length;
  const sum = (fn) => entries.reduce((s,e) => s + (fn(e)||0), 0);
  const avg = (fn) => count ? Math.round((sum(fn)/count) * 10) / 10 : 0;
  return {
    daysLogged: count,
    waterHitDays: entries.filter(e=>e.waterHit).length,
    carbsOkDays: entries.filter(e=>e.carbsOk).length,
    sleptEarlyDays: entries.filter(e=>e.sleptEarly).length,
    morningWaterDays: entries.filter(e=>e.morningWater).length,
    fedSoelDays: entries.filter(e=>e.fedSoel).length,
    totalFocusSessions: sum(e=>e.focusSessions),
    avgCarbs: avg(e=>e.carbs), avgFat: avg(e=>e.fat), avgProtein: avg(e=>e.protein),
  };
}

function renderBackupMsg() {
  const el = document.getElementById("backupMsg");
  if (el) el.textContent = ui.importMsg;
}

function exportSaveFile() {
  try {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `daybreak-quest-save-${today()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    ui.importMsg = "Save file downloaded!";
    renderBackupMsg();
    setTimeout(() => { ui.importMsg = ""; renderBackupMsg(); }, 3000);
  } catch (e) {
    ui.importMsg = "Couldn't download a file here — try the copy/paste backup below instead.";
    renderBackupMsg();
  }
}
function triggerImportFile() {
  const input = document.getElementById("importFileInput");
  if (input) input.click();
}
function handleImportFile(fileInput) {
  const file = fileInput.files && fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      if (!parsed || typeof parsed !== "object" || !parsed.player) throw new Error("bad shape");
      state = mergeDefaults(defaultState(), parsed);
      save();
      ui.importMsg = "Save file imported!";
      renderBackupMsg();
      setTimeout(() => { ui.showBackup = false; render(); }, 1000);
    } catch (err) {
      ui.importMsg = "That file didn't look like a valid save.";
      renderBackupMsg();
    }
  };
  reader.readAsText(file);
  fileInput.value = "";
}

function renderFxOverlay(target) {
  if (!ui.fx || !ui.fx[target]) return "";
  const fx = ui.fx[target];
  const styles = {
    hit:    { color:"#E85B5B", anim:"fxFloat", size:22, weight:800 },
    crit:   { color:C.gold,    anim:"fxFloatBig", size:30, weight:900 },
    miss:   { color:C.inkSoft, anim:"fxFloat", size:16, weight:700 },
    fumble: { color:C.inkSoft, anim:"fxFloat", size:15, weight:700 },
    heal:   { color:"#5FAE5F", anim:"fxFloat", size:22, weight:800 },
    retaliation: { color:"#E85B5B", anim:"fxFloat", size:20, weight:800 },
  };
  const s = styles[fx.kind] || styles.hit;
  return `<div style="position:absolute;left:50%;top:38%;pointer-events:none;z-index:5;animation:${s.anim} .95s ease-out forwards;font-family:'Poppins','Segoe UI',sans-serif;font-weight:${s.weight};font-size:${s.size}px;color:${s.color};text-shadow:0 2px 6px rgba(0,0,0,.15);white-space:nowrap">${fx.text}</div>`;
}

    const nodeContent = `

        <button data-act="openZoneDetail" data-arg="${loc.id}" ${!unlocked ? "disabled" : ""} class="disp" style="width:54px;height:54px;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:22px;background:${unlocked ? (ready ? C.sage : C.sageSoft) : C.creamDeep};border:3px solid ${unlocked ? C.sage : C.border};opacity:${unlocked ? 1 : 0.6};box-shadow:0 2px 6px rgba(74,59,50,.15)">${unlocked ? loc.icon : "🔒"}</button>

      ${nodes}
    </div>
  </div>`;
}

function renderCharacterSheet() {
  const scores = abilityScores();
  const eb = equippedBonus();
  const abs = { str: abilityMod(scores.str), dex: abilityMod(scores.dex), con: abilityMod(scores.con), int: abilityMod(scores.int), wis: abilityMod(scores.wis), cha: abilityMod(scores.cha) };
  const useDarkStone = state.theme !== "dark";
  const gold = useDarkStone ? "#c9a746" : "#A9832F";
  const goldBright = useDarkStone ? "#e0c568" : "#8B6F1F";
  const parchment = useDarkStone ? "#e8dcc0" : "#4A3B32";
  const parchDim = useDarkStone ? "#a99b7c" : "#8A7566";
  const stoneDark = useDarkStone ? "#1a1411" : "#D9C9A8";
  const stoneBg = useDarkStone ? "#241d18" : "#EDE0C4";
  const stonePanel = useDarkStone ? "#2c2119" : "#F3E9D6";
  const panelBorder = useDarkStone ? "#3d3226" : "#D3C09A";
  const green = useDarkStone ? "#7fbf7f" : "#4A8F4A";
  const red = useDarkStone ? "#d67a7a" : "#B84040";
  const outerBorder = useDarkStone ? "#6b5330" : "#B89A5E";
  const portraitAccent = useDarkStone ? "#4a3c28" : "#C9B37E";
  const emptySlotBorder = useDarkStone ? "#4a3f30" : "#C9B896";

  const abLabels = [["str","STR"],["dex","DEX"],["con","CON"],["int","INT"],["wis","WIS"],["cha","CHA"]];

  const radarChart = (() => {
    const cx = 90, cy = 88, R = 62, minV = 6, maxV = 26;
    const angleFor = i => (Math.PI/180) * (-90 + i*60);
    const pointFor = (i, frac) => { const a = angleFor(i); return [cx + R*frac*Math.cos(a), cy + R*frac*Math.sin(a)]; };
    const gridColor = useDarkStone ? "#5a4a36" : "#C9B896";
    const ringPolys = [0.25,0.5,0.75,1].map(frac => {
      const pts = abLabels.map((_,i) => pointFor(i, frac).join(",")).join(" ");
      return `<polygon points="${pts}" fill="none" stroke="${gridColor}" stroke-width="1" opacity="0.45"/>`;
    }).join("");
    const axisLines = abLabels.map((_,i) => {
      const [x,y] = pointFor(i, 1);
      return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="${gridColor}" stroke-width="1" opacity="0.4"/>`;
    }).join("");
    const dataPts = abLabels.map(([k],i) => {
      const frac = Math.max(0.04, Math.min(1, (scores[k]-minV)/(maxV-minV)));
      return pointFor(i, frac).join(",");
    }).join(" ");
    const labelEls = abLabels.map(([k,label],i) => {
      const [x,y] = pointFor(i, 1.24);
      return `<text x="${x}" y="${y}" font-size="11" font-weight="700" fill="${gold}" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
    }).join("");
    return `<svg width="180" height="176" viewBox="0 0 180 176" style="display:block;margin:0 auto">
      ${ringPolys}${axisLines}
      <polygon points="${dataPts}" fill="${useDarkStone ? "rgba(201,167,70,.28)" : "rgba(169,131,47,.22)"}" stroke="${gold}" stroke-width="2.5"/>
      ${labelEls}
    </svg>`;
  })();

  const statChipsCompact = abLabels.map(([k,label]) => {
    const score = scores[k];
    const mod = abs[k];
    const modColor = mod > 0 ? green : mod < 0 ? red : parchDim;
    return `<span style="font-size:10.5px;color:${parchDim};margin-right:10px">${label} <b style="color:${parchment}">${score}</b> <span style="color:${modColor}">${mod>=0?"+":""}${mod}</span></span>`;
  }).join("");

  const luckB = eb.luck + familiarLuckBonus();
  const lvlBonus = Math.floor(state.player.level/4);
  const divinerB = state.specialization === "diviner" ? 2 : 0;
  const totalHit = lvlBonus + luckB + abs.dex + divinerB;
  const lvlDmg = Math.round(state.player.level*0.8);
  const totalDmg = lvlDmg + eb.atk + abs.int;
  const evokerNote = state.specialization === "evoker" ? ` <span style="color:${gold}">× 1.15 (Evoker)</span>` : "";

  const modLine = (label, val) => val ? `<p style="font-size:10px;color:${parchDim};margin:1px 0">${label}: <span style="color:${parchment}">${val>=0?"+":""}${val}</span></p>` : "";

  const breakdownPanel = `
    <div style="margin-top:10px;background:${stonePanel};border:1px solid ${panelBorder};border-radius:6px;padding:10px 12px">
      <p style="font-size:11px;font-weight:700;color:${gold};letter-spacing:0.5px;margin:0 0 6px">ATTACK ROLL MODIFIERS</p>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:10.5px;color:${parchDim}">To-Hit Bonus</span>
        <span style="font-size:13px;font-weight:700;color:${parchment}">+${totalHit}</span>
      </div>
      ${modLine("Level", lvlBonus)}${modLine("DEX", abs.dex)}${modLine("Gear Luck", luckB)}${modLine("Diviner", divinerB)}
      <div style="height:1px;background:${panelBorder};margin:8px 0"></div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
        <span style="font-size:10.5px;color:${parchDim}">Spell Damage Bonus</span>
        <span style="font-size:13px;font-weight:700;color:${parchment}">+${totalDmg}${evokerNote}</span>
      </div>
      ${modLine("Level", lvlDmg)}${modLine("Gear ATK", eb.atk)}${modLine("INT", abs.int)}
    </div>`;

  const spec = state.specialization ? SPECIALIZATIONS.find(s => s.id === state.specialization) : null;
  const tier = reputationTier(state.reputation||0);
  const feats = [
    spec ? `${spec.icon} ${spec.name}` : null,
    `🏅 ${tier.title}`,
    (state.ascensionRank||0) > 0 ? `🌟 ${ascensionTitle(state.ascensionRank)} (Max Focus +${state.ascensionRank})` : null,
  ].filter(Boolean);
  const featsPanel = `
    <div style="margin-top:10px;background:${stonePanel};border:1px solid ${panelBorder};border-radius:6px;padding:10px 12px">
      <p style="font-size:11px;font-weight:700;color:${gold};letter-spacing:0.5px;margin:0 0 6px">TITLES & SPECIALIZATION</p>
      ${feats.map(f => `<p style="font-size:11.5px;color:${parchment};margin:3px 0">${f}</p>`).join("")}
      <p style="font-size:9.5px;color:${parchDim};margin:6px 0 0">DEX: to-hit · INT: spell damage · CON: Max HP · WIS: reduces boss damage · CHA: gold found · STR: companion damage</p>
    </div>`;

  const slotLabels = [["weapon","🪄"],["armor","🛡️"],["cloak","🧣"],["amulet","🔯"],["trinket","💎"],["ring1","💍"],["ring2","💍"]];
  const gearSlots = slotLabels.map(([slotKey,icon]) => {
    const itemId = state.equipment[slotKey];
    const item = itemId ? findGearItem(itemId) : null;
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;width:52px">
        <div style="width:42px;height:42px;border-radius:9999px;background:${item ? `radial-gradient(circle at 35% 30%, ${portraitAccent}, ${stonePanel})` : stoneDark};border:2px solid ${item ? gold : emptySlotBorder};display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:${item ? "0 0 6px rgba(201,167,70,.4)" : "none"}">${icon}</div>
        <p style="font-size:8px;color:${item ? parchment : parchDim};margin:0;text-align:center;line-height:1.15;font-weight:${item?700:400}">${item ? item.name.split(" ").slice(0,2).join(" ") : "—"}</p>
      </div>`;
  }).join("");
  const gearPanel = `
    <div style="margin-top:10px;background:${stonePanel};border:1px solid ${panelBorder};border-radius:6px;padding:12px">
      <p style="font-size:11px;font-weight:700;color:${gold};letter-spacing:0.5px;margin:0 0 10px">EQUIPPED GEAR</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between">${gearSlots}</div>
    </div>`;

  return `
    <div style="background:linear-gradient(160deg, ${stoneBg}, ${stoneDark});border:3px solid ${outerBorder};border-radius:10px;padding:3px;box-shadow:0 4px 14px rgba(0,0,0,.35)">
      <div style="border:1px solid ${gold};border-radius:8px;padding:14px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="width:52px;height:52px;border-radius:9999px;background:radial-gradient(circle at 35% 30%, ${portraitAccent}, ${stonePanel});border:2px solid ${gold};display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">🪄</div>
          <div>
            <p class="disp" style="font-weight:700;font-size:15px;margin:0;color:${goldBright};letter-spacing:0.5px">${escapeHtml(state.player.name)}</p>
            <p style="font-size:10.5px;color:${parchDim};margin:1px 0 0">Level ${state.player.level} Mage${spec ? ` · ${spec.name}` : ""}</p>
          </div>
        </div>
        ${radarChart}
        <div style="display:flex;flex-wrap:wrap;justify-content:center;margin-top:6px">${statChipsCompact}</div>
        ${breakdownPanel}
        ${gearPanel}
        ${featsPanel}
      </div>
    </div>`;
}

function renderBond() {
  const cards = PARTY.map(m => {
    const unlocked = state.player.level >= m.unlockLv;
    const activity = BOND_ACTIVITIES[m.id];
    const aff = state.affinity[m.id] || 0;
    const tiers = SNIPPETS[m.id] || [];
    const nextTier = tiers.find(t => aff < t.at);
    if (!unlocked) {
      return card(`
        <div style="padding:14px;display:flex;align-items:center;gap:12px;opacity:0.55">
          <div style="width:42px;height:42px;border-radius:9999px;background:${C.creamDeep};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:20px">🔒</span></div>
          <div style="flex:1"><p class="disp" style="font-weight:700;font-size:13px;margin:0">${m.name}</p><p style="font-size:11px;color:${C.inkSoft};margin:2px 0 0">Unlocks at Level ${m.unlockLv}</p></div>
        </div>
      `);
    }
    const last = state.bondCooldowns[m.id] || 0;
    const remaining = BOND_COOLDOWN_MS - (ui.now - last);
    const ready = remaining <= 0;
    return card(`
      <div style="padding:14px">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:42px;height:42px;border-radius:9999px;background:${m.color}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px">${m.icon}</div>
          <div style="flex:1">
            <p class="disp" style="font-weight:700;font-size:13px;margin:0">${m.name}</p>
            <p style="font-size:11px;color:${C.inkSoft};margin:2px 0 0">${activity.icon} ${activity.label}${ready ? "" : ` · ${fmtMs(remaining)}`}</p>
          </div>
          <button data-act="bondWithCompanion" data-arg="${m.id}" ${ready?"":"disabled"} class="disp" style="padding:6px 14px;border-radius:9999px;font-size:11px;font-weight:700;flex-shrink:0;background:${ready ? m.color : C.creamDeep};color:${ready ? "white" : C.inkSoft}">${ready ? activity.label : "Resting"}</button>
        </div>
        <div style="margin-top:10px">
          <div style="height:5px;border-radius:9999px;overflow:hidden;background:${C.creamDeep}">
            <div style="height:5px;background:${m.color};width:${nextTier ? Math.min(100,(aff/nextTier.at)*100) : 100}%"></div>
          </div>
          <p style="font-size:10px;color:${C.inkSoft};margin:3px 0 0">Bond ${aff}${nextTier ? ` · next at ${nextTier.at}` : " · fully bonded"}</p>
        </div>
      </div>
    `);
  }).join("<div style='height:10px'></div>");
  return `<div>
    <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 4px">💞 Bond</p>
    <p style="font-size:11px;color:${C.inkSoft};margin:0 0 14px">Spend deliberate time with someone — resets every few hours, separate for each person.</p>
    ${cards}
  </div>`;
}

function renderParty() {
  const items = PARTY.map(m => {
    const unlocked = state.player.level >= m.unlockLv;
    const aff = state.affinity[m.id] || 0;
    const tiers = SNIPPETS[m.id] || [];
    const unlockedLines = tiers.filter(t => aff >= t.at);
    const nextTier = tiers.find(t => aff < t.at);
    const bondBlock = unlocked && tiers.length > 0 ? `
      <div style="margin-top:12px">
        <div style="height:5px;border-radius:9999px;overflow:hidden;background:${C.creamDeep}">
          <div style="height:5px;background:${m.color};width:${nextTier ? Math.min(100,(aff/nextTier.at)*100) : 100}%"></div>
        </div>
        <p style="font-size:10px;color:${C.inkSoft};margin:3px 0 0">Bond ${aff}${nextTier ? ` · next at ${nextTier.at}` : " · fully bonded"}</p>
        ${unlockedLines.length ? `<div style="display:flex;flex-direction:column;gap:4px;margin-top:8px">${unlockedLines.map(t=>`<p style="font-size:11.5px;color:${C.inkSoft};font-style:italic;margin:0">${escapeHtml(t.line)}</p>`).join("")}</div>` : ""}
      </div>` : "";
    const isSoel = m.id === "soel";
    const cq = (!isSoel && unlocked) ? currentCompanionQuest(m.id) : null;
    const companionQuestBtn = cq ? `
      <button data-act="openCompanionQuest" data-arg="${m.id}" class="disp" style="margin-top:10px;padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;background:${C.gold};color:white">📜 Personal Quest: ${cq.title}</button>` : "";
    const isActive = state.activeParty.includes(m.id);
    const activeToggle = (unlocked && !isSoel) ? `
      <button data-act="toggleActiveParty" data-arg="${m.id}" class="disp" style="margin-top:10px;padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;background:${isActive ? m.color : C.creamDeep};color:${isActive ? "white" : C.inkSoft}">${isActive ? "⚔️ Fighting alongside you" : "Bring on Expeditions & fights"}</button>` : "";
    const levelBar = (unlocked && !isSoel) ? (() => {
      const lvl = companionLevel(m.id);
      const xp = companionXp(m.id);
      const toNext = companionXpToNext(lvl);
      return `
        <div style="margin-top:8px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:10.5px;font-weight:700;color:${m.color}">Lv.${lvl}</span>
            <span style="font-size:9px;color:${C.inkSoft}">${xp}/${toNext} XP</span>
          </div>
          <div style="height:5px;border-radius:9999px;overflow:hidden;background:${C.creamDeep}">
            <div style="height:5px;width:${Math.min(100,(xp/toNext)*100)}%;background:${m.color}"></div>
          </div>
        </div>`;
    })() : "";
    const equipped = state.companionEquipment[m.id] || {};
    const gearChipRow = (unlocked && !isSoel) ? (() => {
      const slotLabels = [["weapon","⚔️"],["armor","🛡️"],["trinket","💎"],["amulet","🔯"],["cloak","🧣"],["ring1","💍1"],["ring2","💍2"]];
      const chips = slotLabels.map(([slotKey,icon]) => {
        const itemId = equipped[slotKey];
        const item = itemId ? COMPANION_GEAR.find(g => g.id === itemId) : null;
        return `
          <div style="min-width:64px;flex:1;padding:6px 6px;border-radius:10px;background:${item?C.mageSoft:C.creamDeep};text-align:center">
            <p style="font-size:9px;color:${C.inkSoft};margin:0">${icon}</p>
            <p style="font-size:9.5px;font-weight:700;color:${item?C.mageDeep:C.inkSoft};margin:2px 0 0;line-height:1.2">${item ? item.name.replace("Companion's ","").replace("Companion ","") : "Empty"}</p>
          </div>`;
      }).join("");
      return `<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">${chips}</div>`;
    })() : "";
    const renderSlotPicker = (targetSlot, slotLabel, itemSlotType) => {
      const itemSlot = itemSlotType || targetSlot;
      const assignedId = equipped[targetSlot];
      const assignedGear = assignedId ? COMPANION_GEAR.find(g => g.id === assignedId) : null;
      const availableGear = COMPANION_GEAR.filter(g => g.slot === itemSlot && (state.companionGearOwned[g.id]||0) > 0);
      return `
        <div style="margin-top:8px">
          <p style="font-size:10px;color:${C.inkSoft};margin:0 0 5px">${slotLabel}: ${assignedGear ? `${assignedGear.icon} ${assignedGear.name}` : "Empty"}</p>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${assignedGear ? `<button data-act="assignCompanionGear" data-arg="${m.id}|${targetSlot}|none" class="disp" style="padding:4px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.creamDeep};color:${C.inkSoft}">Unequip</button>` : ""}
            ${availableGear.map(g => `<button data-act="assignCompanionGear" data-arg="${m.id}|${targetSlot}|${g.id}" class="disp" style="padding:4px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.mageSoft};color:${C.mageDeep}">${g.icon} ${g.name} (${state.companionGearOwned[g.id]})</button>`).join("")}
            ${(!assignedGear && availableGear.length === 0) ? `<span style="font-size:9.5px;color:${C.inkSoft};font-style:italic">Craft gear for this slot in the Craft tab</span>` : ""}
          </div>
        </div>`;
    };
    const gearPicker = (unlocked && !isSoel) ? `
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid ${C.border}">
        ${renderSlotPicker("weapon", "⚔️ Weapon")}
        ${renderSlotPicker("armor", "🛡️ Armor")}
        ${renderSlotPicker("trinket", "💎 Trinket")}
        ${renderSlotPicker("amulet", "🔯 Amulet")}
        ${renderSlotPicker("cloak", "🧣 Cloak")}
        ${renderSlotPicker("ring1", "💍 Ring 1", "ring")}
        ${renderSlotPicker("ring2", "💍 Ring 2", "ring")}
      </div>` : "";
    const familiarBagToggle = (unlocked && isSoel) ? `
      <button data-act="toggleFamiliarOut" class="disp" style="margin-top:10px;padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;background:${state.familiarOut ? m.color : C.creamDeep};color:${state.familiarOut ? "white" : C.inkSoft}">${state.familiarOut ? "🐱 Out & Alert" : "🎒 Safely Bagged"}</button>` : "";
    const familiarTrinketPicker = (unlocked && isSoel) ? (() => {
      const assignedId = state.familiarTrinket;
      const assignedItem = assignedId ? FAMILIAR_TRINKETS.find(t => t.id === assignedId) : null;
      const availableItems = FAMILIAR_TRINKETS.filter(t => (state.familiarTrinketOwned[t.id]||0) > 0);
      if (!assignedItem && availableItems.length === 0) return "";
      return `
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid ${C.border}">
          <p style="font-size:10px;color:${C.inkSoft};margin:0 0 5px">💍 Trinket: ${assignedItem ? `${assignedItem.icon} ${assignedItem.name}` : "Empty"}</p>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${assignedItem ? `<button data-act="assignFamiliarTrinket" data-arg="none" class="disp" style="padding:4px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.creamDeep};color:${C.inkSoft}">Unequip</button>` : ""}
            ${availableItems.map(t => `<button data-act="assignFamiliarTrinket" data-arg="${t.id}" class="disp" style="padding:4px 10px;border-radius:9999px;font-size:10.5px;font-weight:700;background:${C.mageSoft};color:${C.mageDeep}">${t.icon} ${t.name} (${state.familiarTrinketOwned[t.id]})</button>`).join("")}
          </div>
        </div>`;
    })() : "";
    return card(`
      <div style="padding:14px;opacity:${unlocked ? 1 : 0.55}">
        <div style="display:flex;align-items:center;gap:12px">
          <div style="width:46px;height:46px;border-radius:9999px;background:${m.color}22;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="font-size:${unlocked ? 22 : 18}px">${unlocked ? m.icon : "🔒"}</span>
          </div>
          <div style="flex:1">
            <p class="disp" style="font-weight:700;font-size:14px;margin:0">${m.name} <span style="font-weight:500;color:${C.inkSoft};font-size:12px">· ${m.title}</span></p>
            <p style="font-size:12px;color:${C.inkSoft};margin:2px 0 0">${unlocked ? m.bio : `Unlocks at Level ${m.unlockLv}`}</p>
            ${unlocked ? `<p style="font-size:11px;color:${m.color};margin:3px 0 0;font-weight:700">${m.id === "aisyah" && state.questFlags.aisyahBonus ? "+35% Gold found (Sealed Chest bond)" : m.passive}${isSoel && !state.familiarOut ? " (inactive while bagged)" : ""}</p>` : ""}
          </div>
        </div>
        ${levelBar}
        ${gearChipRow}
        ${companionQuestBtn}
        ${activeToggle}
        ${gearPicker}
        ${familiarBagToggle}
        ${familiarTrinketPicker}
        ${bondBlock}
      </div>
    `);
  }).join("<div style='height:12px'></div>");
  return `<div>
    ${renderCharacterSheet()}
    <div style="height:16px"></div>
    <p style="font-size:12px;color:${C.inkSoft};margin:0 0 12px">Bring your unlocked companions to strike alongside you in every fight, Expedition, and Raid. Soel's a familiar, not a fighter — he lends passive luck and trap sense instead.</p>
    ${items}
  </div>`;
}

function renderQuests() {
  ensureDaily();
  const tasks = todaysTasks();
  const taskRows = tasks.map((t,i) => {
    const val = t.calc();
    const complete = val >= t.goal;
    const claimed = state.dailyTasksClaimed.ids.includes(t.id);
    return `
      <div style="padding:12px 14px;${i>0?`border-top:1px solid ${C.border};`:""}display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="flex:1">
          <p style="font-size:12.5px;margin:0">${t.desc}</p>
          <div style="height:5px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:6px">
            <div style="height:5px;width:${Math.min(100,(val/t.goal)*100)}%;background:${complete?C.sage:C.mage}"></div>
          </div>
        </div>
        ${claimed ? `<span style="font-size:14px;flex-shrink:0">✔️</span>` : complete ? `<button data-act="claimTask" data-arg="${t.id}" class="disp" style="padding:4px 10px;border-radius:9999px;background:${C.mageDeep};color:white;font-size:11px;font-weight:600;flex-shrink:0">Claim</button>` : `<span style="font-size:11px;color:${C.inkSoft};flex-shrink:0">${Math.min(val,t.goal)}/${t.goal}</span>`}
      </div>`;
  }).join("");

  const hl = todaysHitList();
  const hlVal = hitListValue(hl.target);
  const hlComplete = hlVal >= hl.goal;
  const nextGearIdx = BOUNTY_GEAR_MILESTONES.findIndex(m => m > (state.hitListCompletions||0));
  const gearHint = nextGearIdx >= 0 ? `${BOUNTY_GEAR_MILESTONES[nextGearIdx] - (state.hitListCompletions||0)} more clears until ${BOUNTY_GEAR[nextGearIdx].name}` : "All bounty gear unlocked";
  const hitListCard = card(`
    <div style="padding:14px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <p class="disp" style="font-weight:700;font-size:14px;margin:0">🎯 Hit List</p>
        <span style="font-size:11px;color:${C.inkSoft}">${state.hitListCompletions||0} cleared</span>
      </div>
      <p style="font-size:12px;color:${C.inkSoft};margin:2px 0 0">${hl.target === "any" ? "Defeat 5 monsters of any kind today" : `Defeat ${hl.goal}× ${hl.target}`}</p>
      <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:8px">
        <div style="height:6px;width:${Math.min(100,(hlVal/hl.goal)*100)}%;background:${hlComplete?C.sage:C.pink}"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <span style="font-size:11px;color:${C.inkSoft}">${Math.min(hlVal,hl.goal)}/${hl.goal} · ${hl.reward.gold}g +${hl.reward.xp}xp</span>
        ${state.hitListClaimed.claimed ? `<span style="font-size:14px">✔️</span>` : hlComplete ? `<button data-act="claimHitList" class="disp" style="padding:4px 12px;border-radius:9999px;background:${C.pink};color:white;font-size:11px;font-weight:600">Claim</button>` : ""}
      </div>
      <p style="font-size:10.5px;color:${C.inkSoft};margin:8px 0 0;font-style:italic">${gearHint}</p>
    </div>
  `);

  const bounties = todaysBounties();
  const bountyRows = bounties.map((b,i) => {
    const val = b.calc();
    const complete = val >= b.goal;
    const claimed = state.dailyTasksClaimed.ids.includes(b.id);
    return `
      <div style="padding:12px 14px;${i>0?`border-top:1px solid ${C.border};`:""}display:flex;align-items:center;justify-content:space-between;gap:8px">
        <div style="flex:1">
          <p style="font-size:12.5px;margin:0">${b.icon} ${b.desc}</p>
          <div style="height:5px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:6px">
            <div style="height:5px;width:${Math.min(100,(val/b.goal)*100)}%;background:${complete?C.sage:C.gold}"></div>
          </div>
        </div>
        ${claimed ? `<span style="font-size:14px;flex-shrink:0">✔️</span>` : complete ? `<button data-act="claimTask" data-arg="${b.id}" class="disp" style="padding:4px 10px;border-radius:9999px;background:${C.gold};color:white;font-size:11px;font-weight:600;flex-shrink:0">Claim</button>` : `<span style="font-size:11px;color:${C.inkSoft};flex-shrink:0">${Math.min(val,b.goal)}/${b.goal}</span>`}
      </div>`;
  }).join("");

  const wk = isoWeekKey(new Date());
  const weeklyDone = state.weeklyTaskClaimed && state.weeklyTaskClaimed.week === wk && state.weeklyTaskClaimed.done;
  const weeklyVal = weeklyCallsCount();
  const weeklyComplete = weeklyVal >= WEEKLY_TASK.goal;
  const weeklyCard = card(`
    <div style="padding:14px">
      <p class="disp" style="font-weight:700;font-size:13px;margin:0 0 4px;color:${C.gold}">This Week</p>
      <p style="font-size:12.5px;margin:0">${WEEKLY_TASK.desc}</p>
      <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:8px">
        <div style="height:6px;width:${Math.min(100,(weeklyVal/WEEKLY_TASK.goal)*100)}%;background:${weeklyComplete?C.sage:C.gold}"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <span style="font-size:11px;color:${C.inkSoft}">${Math.min(weeklyVal,WEEKLY_TASK.goal)}/${WEEKLY_TASK.goal} · ${WEEKLY_TASK.reward.gold}g +${WEEKLY_TASK.reward.xp}xp</span>
        ${weeklyDone ? `<span style="font-size:14px">✔️</span>` : weeklyComplete ? `<button data-act="claimWeeklyTask" class="disp" style="padding:4px 10px;border-radius:9999px;background:${C.gold};color:white;font-size:11px;font-weight:600">Claim</button>` : ""}
      </div>
    </div>
  `);

  const chainItems = QUEST_CHAINS.map(chain => {
    const idx = state.questChainProgress[chain.id] || 0;
    const done = idx >= chain.steps.length;
    const step = done ? null : chain.steps[idx];
    const val = done ? 0 : questValue(step.track);
    const complete = !done && val >= step.goal;
    return card(`
      <div style="padding:14px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <p class="disp" style="font-weight:700;font-size:14px;margin:0">${chain.icon} ${chain.title}</p>
          <span style="font-size:11px;color:${C.inkSoft}">${done ? "Complete" : `Step ${idx+1}/${chain.steps.length}`}</span>
        </div>
        ${done ? `<p style="font-size:12px;color:${C.sage};margin:6px 0 0">All steps complete. 🎉</p>` : `
          <p style="font-size:12px;color:${C.inkSoft};margin:2px 0 0">${step.desc}</p>
          <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:8px">
            <div style="height:6px;width:${Math.min(100,(val/step.goal)*100)}%;background:${complete?C.sage:C.mage}"></div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
            <span style="font-size:11px;color:${C.inkSoft}">${Math.min(val,step.goal)}/${step.goal} · ${step.reward.gold}g${step.reward.xp?` +${step.reward.xp}xp`:""}</span>
            ${complete ? `<button data-act="claimChainStep" data-arg="${chain.id}" class="disp" style="padding:4px 12px;border-radius:9999px;background:${C.mageDeep};color:white;font-size:11px;font-weight:600">Claim</button>` : ""}
          </div>
        `}
      </div>
    `);
  }).join("<div style='height:12px'></div>");

  const milestoneItems = MILESTONE_QUESTS.map(q => {
    const val = questValue(q.track);
    const complete = val >= q.goal;
    const claimed = state.questsClaimed.includes(q.id);
    return card(`
      <div style="padding:14px">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <p class="disp" style="font-weight:700;font-size:14px;margin:0">${q.name}</p>
          <span>${claimed ? "✔️" : complete ? "⭐" : "📜"}</span>
        </div>
        <p style="font-size:12px;color:${C.inkSoft};margin:2px 0 0">${q.desc}</p>
        <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:8px">
          <div style="height:6px;width:${Math.min(100,(val/q.goal)*100)}%;background:${complete?C.sage:C.mage}"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
          <span style="font-size:11px;color:${C.inkSoft}">${Math.min(val,q.goal)}/${q.goal} · ${q.reward.gold}g${q.reward.xp?` +${q.reward.xp}xp`:""}</span>
          ${complete && !claimed ? `<button data-act="claimQuest" data-arg="${q.id}" class="disp" style="padding:4px 12px;border-radius:9999px;background:${C.mageDeep};color:white;font-size:11px;font-weight:600">Claim</button>` : ""}
        </div>
      </div>
    `);
  }).join("<div style='height:12px'></div>");

  const dq = todaysDayQuest();
  const giver = PARTY.find(p => p.id === dq.giver);
  const dqUnlocked = state.player.level >= giver.unlockLv;
  let dqBody;
  if (!dqUnlocked) {
    dqBody = `<p style="font-size:12px;color:${C.inkSoft};margin:6px 0 0">${giver.name} hasn't joined yet — unlocks at Level ${giver.unlockLv}.</p>`;
  } else if (dq.type === "choice") {
    dqBody = state.dayQuest.claimed
      ? `<p style="font-size:12px;color:${C.sage};margin:6px 0 0">${dq.options[state.dayQuest.choiceMade].result}</p>`
      : `<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">${dq.options.map((opt,i) => `<button data-act="chooseDayQuest" data-arg="${i}" class="disp" style="padding:10px;border-radius:14px;font-size:12.5px;font-weight:600;background:${C.mageSoft};color:${C.mageDeep};text-align:left">${opt.label}</button>`).join("")}</div>`;
  } else {
    const val = dayQuestValue(dq.track);
    const complete = val >= dq.goal;
    dqBody = state.dayQuest.claimed
      ? `<p style="font-size:12px;color:${C.sage};margin:6px 0 0">${dq.complete}</p>`
      : `
        <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:8px">
          <div style="height:6px;width:${Math.min(100,(val/dq.goal)*100)}%;background:${complete?C.sage:C.mage}"></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
          <span style="font-size:11px;color:${C.inkSoft}">${Math.min(val,dq.goal)}/${dq.goal} · ${dq.reward.gold}g +${dq.reward.xp}xp</span>
          ${complete ? `<button data-act="claimDayQuest" class="disp" style="padding:4px 12px;border-radius:9999px;background:${C.mageDeep};color:white;font-size:11px;font-weight:600">Claim</button>` : ""}
        </div>`;
  }
  const dayQuestCard = card(`
    <div style="padding:14px">
      <p class="disp" style="font-weight:700;font-size:14px;margin:0">${dq.icon} ${dq.title}</p>
      <p style="font-size:12px;color:${C.inkSoft};font-style:italic;margin:4px 0 0">${dq.intro}</p>
      ${dqBody}
    </div>
  `);

  const vigilGoalVal = vigilGoal();
  const vigilVal = state.totalCheckIns;
  const vigilComplete = vigilVal >= vigilGoalVal;
  const vigilCard = card(`
    <div style="padding:14px">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <p class="disp" style="font-weight:700;font-size:14px;margin:0">♾️ The Unending Vigil</p>
        <span style="font-size:11px;color:${C.inkSoft}">Tier ${state.vigilTier||0}</span>
      </div>
      <p style="font-size:12px;color:${C.inkSoft};margin:2px 0 0">An active quest with no end — keep answering calls to advance it.</p>
      <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:8px">
        <div style="height:6px;width:${Math.min(100,(vigilVal/vigilGoalVal)*100)}%;background:${vigilComplete?C.sage:C.mage}"></div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <span style="font-size:11px;color:${C.inkSoft}">${Math.min(vigilVal,vigilGoalVal)}/${vigilGoalVal} total calls</span>
        ${vigilComplete ? `<button data-act="claimVigil" class="disp" style="padding:4px 12px;border-radius:9999px;background:${C.mageDeep};color:white;font-size:11px;font-weight:600">Claim</button>` : ""}
      </div>
    </div>
  `);

  const activeSideQuestCards = state.activeSideQuests.map(qid => {
    const sq = SIDE_QUESTS.find(q => q.id === qid);
    if (!sq) return "";
    const prog = sideQuestProgress(sq);
    const ready = sideQuestReady(sq);
    const turninLoc = LOCATIONS.find(l => l.id === sq.turninZone);
    const turninLm = (turninLoc && turninLoc.landmarks || []).find(l => l.id === sq.turninLandmark);
    return card(`
      <div style="padding:14px">
        <p class="disp" style="font-weight:700;font-size:13px;margin:0">${sq.icon} ${sq.title}</p>
        <p style="font-size:11px;color:${C.inkSoft};font-style:italic;margin:3px 0 0">${sq.giver}</p>
        <div style="height:6px;border-radius:9999px;overflow:hidden;background:${C.creamDeep};margin-top:8px">
          <div style="height:6px;width:${Math.min(100,(prog.have/prog.need)*100)}%;background:${ready?C.sage:C.mage}"></div>
        </div>
        <p style="font-size:10.5px;color:${C.inkSoft};margin:6px 0 0">${prog.have}/${prog.need} ${sq.type==="kill"?sq.target+"s defeated":Object.keys(sq.need)[0]} · Turn in at ${turninLm ? `${turninLm.icon} ${turninLm.name}` : "?"}, ${turninLoc ? turninLoc.name : "?"}</p>
      </div>
    `);
  }).join("<div style='height:10px'></div>");
  const sideQuestSection = state.activeSideQuests.length ? `
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">🗺️ Side Quests</p>
      ${activeSideQuestCards}
    </div>` : `
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">🗺️ Side Quests</p>
      ${card(`<div style="padding:14px"><p style="font-size:12px;color:${C.inkSoft};margin:0">No active side quests. Explore landmarks on the map to find people who need help.</p></div>`)}
    </div>`;

  return `<div style="display:flex;flex-direction:column;gap:18px">
    ${sideQuestSection}
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">📖 Today's Story Quest</p>
      ${dayQuestCard}
    </div>
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">Active Quest</p>
      ${vigilCard}
    </div>
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">Bounty Hunting</p>
      ${hitListCard}
    </div>
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">📌 Bounty Board</p>
      ${card(bountyRows)}
    </div>
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">Today's Tasks</p>
      ${card(taskRows)}
    </div>
    <div>${weeklyCard}</div>
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">Quest Chains</p>
      ${chainItems}
    </div>
    <div>
      <p class="disp" style="font-weight:700;font-size:14px;color:${C.mageDeep};margin:0 0 10px">Milestones</p>
      ${milestoneItems}
    </div>
  </div>`;
}

function renderRecipeRow(r) {
  const afford = canAfford(r);
  const isEquip = r.type === "equipment";
  const isRing = r.slot === "ring";
  const already = isEquip && state.crafted.includes(r.id);
  const equipped = isEquip && !isRing && state.equipment[r.slot] === r.id;
  const needsStr = Object.entries(r.needs).map(([m,q]) => `${q}× ${m}`).join(", ") + (r.gold ? ` + ${r.gold}g` : "");
  const prereqNote = r.requiresCrafted && !state.crafted.includes(r.requiresCrafted)
    ? `<p style="font-size:10.5px;color:${C.pink};margin:2px 0 0">Requires ${RECIPES.find(x=>x.id===r.requiresCrafted).name}</p>` : "";
  let actionBtn;
  if (isEquip && already && isRing) {
    const inRing1 = state.equipment.ring1 === r.id, inRing2 = state.equipment.ring2 === r.id;
    actionBtn = `<div style="display:flex;gap:6px;flex-shrink:0">
      <button data-act="equipRing" data-arg="${r.id}|ring1" ${inRing1?"disabled":""} class="disp" style="padding:6px 9px;border-radius:9999px;font-size:10px;font-weight:700;background:${inRing1?C.sageSoft:C.mageSoft};color:${inRing1?C.sage:C.mageDeep}">${inRing1?"Ring 1 ✓":"→ Ring 1"}</button>
      <button data-act="equipRing" data-arg="${r.id}|ring2" ${inRing2?"disabled":""} class="disp" style="padding:6px 9px;border-radius:9999px;font-size:10px;font-weight:700;background:${inRing2?C.sageSoft:C.mageSoft};color:${inRing2?C.sage:C.mageDeep}">${inRing2?"Ring 2 ✓":"→ Ring 2"}</button>
    </div>`;
  } else if (isEquip && already) {
    actionBtn = `<button data-act="equip" data-arg="${r.id}" ${equipped?"disabled":""} class="disp" style="padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;flex-shrink:0;background:${equipped?C.sageSoft:C.mageSoft};color:${equipped?C.sage:C.mageDeep}">${equipped?"Equipped":"Equip"}</button>`;
  } else {
    actionBtn = `<button data-act="craft" data-arg="${r.id}" ${afford?"":"disabled"} class="disp" style="padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;flex-shrink:0;background:${afford?C.mageDeep:C.creamDeep};color:${afford?"white":C.inkSoft}">${r.type==="refine"?"Refine":"Craft"}</button>`;
  }
  return card(`
    <div style="padding:14px;display:flex;align-items:center;gap:12px">
      <div style="width:42px;height:42px;border-radius:12px;background:${C.mageSoft};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:20px">${r.icon}</span></div>
      <div style="flex:1">
        <p class="disp" style="font-weight:700;font-size:13px;margin:0">${r.name}</p>
        <p style="font-size:11px;color:${C.inkSoft};margin:2px 0 0">${r.effect}</p>
        <p style="font-size:11px;color:${C.inkSoft};margin:2px 0 0">${needsStr}</p>
        ${prereqNote}
      </div>
      ${actionBtn}
    </div>
  `);
}

function renderBountyGear() {
  const owned = BOUNTY_GEAR.filter(g => state.crafted.includes(g.id));
  if (!owned.length) return "";
  const rows = owned.map(r => {
    const equipped = state.equipment[r.slot] === r.id;
    return card(`
      <div style="padding:14px;display:flex;align-items:center;gap:12px">
        <div style="width:42px;height:42px;border-radius:12px;background:${C.mageSoft};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:20px">${r.icon}</span></div>
        <div style="flex:1">
          <p class="disp" style="font-weight:700;font-size:13px;margin:0">${r.name}</p>
          <p style="font-size:11px;color:${C.inkSoft};margin:2px 0 0">${r.effect}</p>
          <p style="font-size:10.5px;color:${C.pink};margin:2px 0 0">Bounty-exclusive</p>
        </div>
        <button data-act="equip" data-arg="${r.id}" ${equipped?"disabled":""} class="disp" style="padding:6px 12px;border-radius:9999px;font-size:11px;font-weight:700;flex-shrink:0;background:${equipped?C.sageSoft:C.mageSoft};color:${equipped?C.sage:C.mageDeep}">${equipped?"Equipped":"Equip"}</button>
      </div>
    `);
  }).join("<div style='height:10px'></div>");
  return `<p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 8px">Bounty Rewards</p>${rows}`;
}

function renderTraders() {
  const disc = reputationDiscount();
  const matRows = MATERIALS.concat(MATERIALS_REFINED).filter(m => (state.materials[m]||0) > 0).map(m => {
    const price = Math.round((SELL_PRICES[m] || 1) * (1 + disc));
    return `
      <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid ${C.border}">
        <span style="font-size:12.5px">${m} ×${state.materials[m]}</span>
        <button data-act="sellMaterial" data-arg="${m}" class="disp" style="padding:4px 10px;border-radius:9999px;background:${C.mageDeep};color:white;font-size:11px;font-weight:600">Sell 1 for ${price}g</button>
      </div>`;
  }).join("");

  const potionRows = Object.entries(state.potions).filter(([,q]) => q > 0).map(([id,q]) => {
    const r = RECIPES.find(x => x.id === id);
    const price = Math.round((POTION_SELL[id] || 4) * (1 + disc));
    return `
      <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid ${C.border}">
        <span style="font-size:12.5px">${r.name} ×${q}</span>
        <button data-act="sellPotion" data-arg="${id}" class="disp" style="padding:4px 10px;border-radius:9999px;background:${C.gold};color:white;font-size:11px;font-weight:600">Sell 1 for ${price}g</button>
      </div>`;
  }).join("");

  const spareEquip = state.crafted.filter(id => !Object.values(state.equipment).includes(id));
  const equipRows = spareEquip.map(id => {
    const r = findGearItem(id);
    if (!r) return "";
    const price = Math.round(Math.max(5, Math.round((r.gold||20) * 0.4)) * (1 + disc));
    return `
      <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid ${C.border}">
        <span style="font-size:12.5px">${r.name}</span>
        <button data-act="sellEquipment" data-arg="${id}" class="disp" style="padding:4px 10px;border-radius:9999px;background:${C.gold};color:white;font-size:11px;font-weight:600">Sell for ${price}g</button>
      </div>`;
  }).join("");

  const tier = reputationTier(state.reputation||0);
  const nextTier = nextReputationTier(state.reputation||0);
  const repNote = disc > 0
    ? `Your standing as "${tier.title}" earns you +${Math.round(disc*100)}% on every sale here.`
    : `Build your Guild Standing (quests, chapters, expeditions) to earn better prices here.`;

  return `
    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 4px">Guild Standing: ${tier.title} (${state.reputation||0}${nextTier ? `, next at ${nextTier.min}` : ""})</p>
    <p style="font-size:10.5px;color:${C.inkSoft};margin:0 0 12px">${repNote}</p>
    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 8px">Lewis · Materials Trader</p>
    ${card(matRows || `<div style="padding:14px"><p style="font-size:12px;color:${C.inkSoft};margin:0">Nothing to sell — Lewis only buys raw and refined materials.</p></div>`)}
    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 8px">Jonathan · Gear & Potions Trader</p>
    ${card((potionRows+equipRows) || `<div style="padding:14px"><p style="font-size:12px;color:${C.inkSoft};margin:0">Nothing to sell — Jonathan buys potions and spare equipment.</p></div>`)}
  `;
}

function renderCompanionGearSection() {
  const slotLabels = { weapon:"⚔️ Weapon", armor:"🛡️ Armor", trinket:"💎 Trinket", amulet:"🔯 Amulet", cloak:"🧣 Cloak", ring:"💍 Ring" };
  const rows = COMPANION_GEAR.map(item => {
    const affordable = canAffordCompanionGear(item);
    const owned = state.companionGearOwned[item.id] || 0;
    const needsStr = Object.entries(item.needs).map(([m,q]) => `${q}× ${m}`).join(", ") + (item.gold ? ` + ${item.gold}g` : "");
    const statStr = [slotLabels[item.slot] || item.slot, item.dmgBonus ? `+${item.dmgBonus} dmg` : "", item.hitBonus ? `+${item.hitBonus} to-hit` : ""].filter(Boolean).join(" · ");
    return card(`
      <div style="padding:14px;display:flex;align-items:center;gap:12px">
        <div style="width:42px;height:42px;border-radius:12px;background:${C.mageSoft};display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:20px">${item.icon}</span></div>
        <div style="flex:1">
          <p class="disp" style="font-weight:700;font-size:13px;margin:0">${item.name}${owned ? ` <span style="color:${C.inkSoft};font-weight:500">×${owned} owned</span>` : ""}</p>
          <p style="font-size:11px;color:${C.inkSoft};margin:2px 0 0">${statStr}</p>

          <p style="font-size:11px;color:${C.inkSoft};margin:2px 0 0">${statStr}</p>

function renderShops() {
  const disc = reputationDiscount();
  const mimiRows = MIMI_STOCK.map(stock => {

    return `
      <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid ${C.border}">
        <div style="flex:1"><span style="font-size:12.5px">${r.icon} ${r.name}</span><p style="font-size:10px;color:${C.inkSoft};margin:2px 0 0">${r.effect}</p></div>
        <button data-act="buyFromMimi" data-arg="${stock.id}" ${affordable?"":"disabled"} class="disp" style="padding:4px 10px;border-radius:9999px;background:${affordable?C.mageDeep:C.creamDeep};color:${affordable?"white":C.inkSoft};font-size:11px;font-weight:600;flex-shrink:0">Buy for ${price}g</button>
      </div>`;
  }).join("");

  const aisyRows = AISY_STOCK.map(stock => {
    const item = COMPANION_GEAR.find(x => x.id === stock.id);
    const price = Math.round(stock.price * (1 - disc));
    const affordable = state.player.gold >= price;
    const slotLabels = { weapon:"⚔️ Weapon", armor:"🛡️ Armor", trinket:"💎 Trinket", amulet:"🔯 Amulet", cloak:"🧣 Cloak", ring:"💍 Ring" };
    return `
      <div style="padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid ${C.border}">
        <div style="flex:1"><span style="font-size:12.5px">${item.icon} ${item.name}</span><p style="font-size:10px;color:${C.inkSoft};margin:2px 0 0">${slotLabels[item.slot]} · ${item.dmgBonus?`+${item.dmgBonus} dmg `:""}${item.hitBonus?`+${item.hitBonus} to-hit`:""}</p></div>
        <button data-act="buyFromAisy" data-arg="${stock.id}" ${affordable?"":"disabled"} class="disp" style="padding:4px 10px;border-radius:9999px;background:${affordable?C.mageDeep:C.creamDeep};color:${affordable?"white":C.inkSoft};font-size:11px;font-weight:600;flex-shrink:0">Buy for ${price}g</button>
      </div>`;
  }).join("");

  return `
    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 4px">Mimi · Potion Seller</p>
    <p style="font-size:11px;color:${C.inkSoft};margin:0 0 10px">Ready-made potions for gold — no materials needed.</p>
    ${card(mimiRows)}
    <p class="disp" style="font-weight:700;font-size:13px;color:${C.mageDeep};margin:16px 0 4px">Aisy · Gear Exchange</p>
    <p style="font-size:11px;color:${C.inkSoft};margin:0 0 10px">Basic companion gear for every slot, ready to buy. Her finer stock still needs Legend and Echo Shards, brought to the Craft bench yourself.</p>
    ${card(aisyRows)}
  `;
}

  const potions = RECIPES.filter(r => r.type === "potion");
